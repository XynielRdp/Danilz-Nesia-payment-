<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRANVEST GOLD - Premium Investment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { --bg: #050505; --card: rgba(22, 22, 22, 0.9); --gold: #c49b3b; --gold-l: #f1d592; --white: #ffffff; }
        body { background: radial-gradient(circle at top right, #1a1a1a, #050505); background-attachment: fixed; color: var(--white); font-family: 'Poppins', sans-serif; margin: 0; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('https://www.transparenttextures.com/patterns/dark-matter.png'); opacity: 0.3; z-index: -1; }
        .auth-card, .dashboard, .history-card { background: var(--card); border: 1px solid rgba(196, 155, 59, 0.3); backdrop-filter: blur(10px); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-main { background: linear-gradient(45deg, var(--gold), var(--gold-l)); color: black; font-weight: 700; border: none; border-radius: 10px; transition: 0.3s; }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(196, 155, 59, 0.4); }
        .form-control, .form-select { background: rgba(0,0,0,0.5); border: 1px solid #333; color: white; margin-bottom: 10px; }
        .form-control:focus, .form-select:focus { background: rgba(0,0,0,0.7); color: white; border-color: var(--gold); box-shadow: none; }
        .table { color: white; font-size: 0.85rem; }
        .chart-container { position: relative; height: 180px; width: 100%; margin-bottom: 20px; }
        #mainDashboard { display: none; }
        .status-pending { color: #ffc107; font-weight: bold; }
        .status-success { color: #28a745; font-weight: bold; }
    </style>
</head>
<body>

<div id="authSection" class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="auth-card w-100" style="max-width: 400px;">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-warning">IRANVEST GOLD</h3>
            <p class="text-muted small">Secure Investment Portal</p>
        </div>
        <input type="text" id="username" class="form-control" placeholder="Username">
        <input type="password" id="password" class="form-control" placeholder="Password">
        <button class="btn-main w-100 py-2 mb-2" onclick="handleLogin()">MASUK</button>
        <button class="btn btn-link text-warning w-100 text-decoration-none small" onclick="handleRegister()">Daftar Investor</button>
    </div>
</div>

<div id="mainDashboard">
    <nav class="navbar navbar-dark py-3">
        <div class="container d-flex justify-content-between">
            <span class="navbar-brand fw-bold text-warning">IRANVEST GOLD</span>
            <button class="btn btn-sm btn-outline-danger" onclick="logout()"><i class="fas fa-power-off"></i></button>
        </div>
    </nav>

    <div class="container mt-3 mb-5">
        <div class="dashboard mb-4">
            <p class="text-secondary mb-1 small">Total Saldo Profit</p>
            <h2 id="uSaldo" class="fw-bold text-warning">Rp 0</h2>
            <div class="row mt-3">
                <div class="col-6"><button class="btn btn-main btn-sm w-100" data-bs-toggle="modal" data-bs-target="#modalDepo">DEPOSIT</button></div>
                <div class="col-6"><button class="btn btn-outline-light btn-sm w-100" data-bs-toggle="modal" data-bs-target="#modalWD">WITHDRAW</button></div>
            </div>
        </div>

        <div class="history-card mb-4">
            <h6 class="fw-bold text-warning mb-3 small">PERTUMBUHAN ASSET</h6>
            <div class="chart-container"><canvas id="investChart"></canvas></div>
        </div>

        <div class="history-card">
            <h6 class="fw-bold text-warning mb-3 small">RIWAYAT TRANSAKSI TERAKHIR</h6>
            <div class="table-responsive">
                <table class="table table-borderless">
                    <thead><tr><th>Tipe</th><th>Jumlah</th><th>Status</th></tr></thead>
                    <tbody id="transactionHistory">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalDepo" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark border-warning">
      <div class="modal-body p-4">
        <h5 class="text-warning fw-bold mb-3">Deposit Baru</h5>
        <p class="small text-secondary">Silahkan transfer ke DANA/OVO: <b>085714438874</b></p>
        <input type="number" id="depAmount" class="form-control" placeholder="Nominal Transfer">
        <button class="btn-main w-100 mt-3" onclick="requestDeposit()">Konfirmasi Sudah Bayar</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="modalWD" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark border-warning">
      <div class="modal-body p-4">
        <h5 class="text-warning fw-bold mb-3">Penarikan Dana</h5>
        <input type="number" id="wdAmount" class="form-control" placeholder="Nominal (Min 50.000)">
        <input type="text" id="wdWallet" class="form-control" placeholder="Nomor E-Wallet/Rekening">
        <select id="wdMethod" class="form-select">
            <option value="DANA">DANA</option>
            <option value="GOPAY">GOPAY</option>
            <option value="OVO">OVO</option>
        </select>
        <button class="btn-main w-100 mt-3" onclick="requestWithdraw()">Tarik Dana</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCwrvbPBNwB0r7PSdFBqa4wS2gag-MmpDE",
        authDomain: "my-invest-database.firebaseapp.com",
        databaseURL: "https://my-invest-database-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "my-invest-database",
        storageBucket: "my-invest-database.firebasestorage.app",
        messagingSenderId: "397898231978",
        appId: "1:397898231978:web:ecf7ff6b9682f5e0b660d3"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentSession = localStorage.getItem("userSession");

    // LOGIN & REGISTER
    function handleRegister() {
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value.trim();
        if(!user || !pass) return alert("Isi data!");
        db.ref('users/' + user).set({ username: user, password: pass, saldo: 0 }).then(() => alert("Daftar Berhasil!"));
    }

    function handleLogin() {
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value.trim();
        db.ref('users/' + user).once('value').then((s) => {
            if(s.val() && s.val().password === pass) {
                localStorage.setItem("userSession", user);
                location.reload();
            } else { alert("User/Password Salah!"); }
        });
    }

    // TRANSAKSI MANUAL KE DATABASE
    function requestDeposit() {
        const amt = document.getElementById('depAmount').value;
        if(amt < 10000) return alert("Minimal Rp 10.000");
        const depId = "DEP" + Date.now();
        db.ref('transactions/' + currentSession + '/' + depId).set({
            type: "Deposit", amount: amt, status: "Pending", date: new Date().toLocaleDateString()
        }).then(() => {
            alert("Laporan terkirim! Admin akan memproses saldo Anda.");
            location.reload();
        });
    }

    function requestWithdraw() {
        const amt = document.getElementById('wdAmount').value;
        const wallet = document.getElementById('wdWallet').value;
        if(amt < 50000) return alert("Minimal Rp 50.000");
        const wdId = "WD" + Date.now();
        db.ref('transactions/' + currentSession + '/' + wdId).set({
            type: "Withdraw", amount: amt, status: "Processing", wallet: wallet, date: new Date().toLocaleDateString()
        }).then(() => {
            alert("Permintaan WD diproses!");
            location.reload();
        });
    }

    // TAMPILKAN DATA
    function initApp() {
        if(!currentSession) return;
        document.getElementById('authSection').style.display = 'none';
        document.getElementById('mainDashboard').style.display = 'block';

        db.ref('users/' + currentSession).on('value', (s) => {
            document.getElementById('uSaldo').innerText = "Rp " + parseInt(s.val().saldo).toLocaleString('id-ID');
        });

        db.ref('transactions/' + currentSession).limitToLast(5).on('value', (s) => {
            const list = document.getElementById('transactionHistory');
            list.innerHTML = "";
            s.forEach((item) => {
                const d = item.val();
                const badge = d.status === 'Success' ? 'status-success' : 'status-pending';
                list.innerHTML += `<tr><td>${d.type}</td><td>Rp ${parseInt(d.amount).toLocaleString()}</td><td class="${badge}">${d.status}</td></tr>`;
            });
        });
        renderChart();
    }

    function renderChart() {
        const ctx = document.getElementById('investChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['M1', 'M2', 'M3', 'M4'],
                datasets: [{ data: [10, 25, 15, 40], borderColor: '#c49b3b', tension: 0.4, fill: true, backgroundColor: 'rgba(196, 155, 59, 0.1)' }]
            },
            options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } }
        });
    }

    function logout() { localStorage.removeItem("userSession"); location.reload(); }
    window.onload = initApp;
</script>
</body>
</html>
