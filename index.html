<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IRANVEST TITAN V8.2 | Daniel Tech</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');

        :root { 
            --neon-blue: #00f3ff; --neon-pink: #ff00ff; --neon-yellow: #ffcc00;
            --dark-bg: #020202; --card-bg: rgba(10, 10, 10, 0.9);
        }

        body { 
            background: var(--dark-bg); color: #e0e0e0; font-family: 'Rajdhani', sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden;
            background-image: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=1000');
            background-size: cover; background-attachment: fixed;
        }

        .overlay-dark { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: -1; }
        .glass { background: var(--card-bg); border: 1px solid var(--neon-blue); backdrop-filter: blur(10px); box-shadow: 0 0 15px rgba(0, 243, 255, 0.2); }
        .btn-cyber { background: transparent; border: 1px solid var(--neon-blue); color: var(--neon-blue); font-family: 'Orbitron'; font-size: 11px; clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%); }
        
        #authPage { height: 100vh; display: none; align-items: center; justify-content: center; background: url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=1000') center/cover; }
        #mainApp { display: none; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: space-around; padding: 15px 0; border-top: 2px solid var(--neon-pink); z-index: 9999; }
        .nav-item { color: #555; font-size: 10px; text-align: center; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--neon-blue); transform: translateY(-5px); }

        section { display: none; padding: 20px 15px 120px; animation: slideIn 0.4s ease-out; }
        .active-sec { display: block !important; }
        @keyframes slideIn { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .stock-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stock-card { background: rgba(0,0,0,0.8); border: 1px solid #333; padding: 10px; border-radius: 5px; position: relative; overflow: hidden; }
        .stock-card img { width: 100%; height: 90px; object-fit: cover; border-radius: 3px; }

        #chatWindow { position: fixed; bottom: 90px; right: 15px; width: 300px; height: 400px; display: none; flex-direction: column; z-index: 10000; }
        #chatMessages { flex: 1; overflow-y: auto; padding: 10px; background: #050505; }
        .chat-bubble { margin-bottom: 10px; padding: 8px; border-radius: 5px; max-width: 85%; font-size: 13px; }
        .chat-me { background: var(--neon-blue); color: #000; align-self: flex-end; margin-left: auto; }
        .chat-bot { background: #222; color: #fff; }

        #adminPanel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 20000; overflow-y: auto; padding: 20px; }
    </style>
</head>
<body>
<div class="overlay-dark"></div>

<audio id="bgMusic" loop>
    <source src="https://files.freemusicarchive.org/storage-freemusicarchive-org/music/no_curator/Ketsa/Raising_Frequency/Ketsa_-_08_-_Day_Trip.mp3" type="audio/mpeg">
</audio>

<div id="chatWindow" class="glass">
    <div class="p-2 border-bottom border-info d-flex justify-content-between">
        <span class="fw-bold">SUPPORT_NODE</span>
        <i class="fas fa-times" onclick="toggleChat()"></i>
    </div>
    <div id="chatMessages" class="d-flex flex-column"></div>
    <div class="p-2 bg-dark d-flex gap-1">
        <label class="btn btn-dark btn-sm m-0"><i class="fas fa-camera"></i><input type="file" hidden onchange="sendPhoto()"></label>
        <input type="text" id="chatInput" class="form-control form-control-sm bg-black text-white" placeholder="Message...">
        <button class="btn btn-info btn-sm" onclick="sendChat()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<div id="authPage">
    <div class="glass p-4 w-100" style="max-width:350px;">
        <h2 class="text-center text-info fw-bold mb-4" style="letter-spacing:3px;">IRANVEST</h2>
        <div id="loginForm">
            <input type="text" id="uL" class="form-control mb-3 bg-transparent text-white border-info" placeholder="ID_USER">
            <input type="password" id="pL" class="form-control mb-4 bg-transparent text-white border-info" placeholder="ID_ACCESS">
            <button class="btn btn-info w-100 py-2 fw-bold" onclick="doLogin()">AUTHORIZE</button>
            <p class="text-center mt-3 small">NO_NODE? <span class="text-info" onclick="toggleAuth(true)" style="cursor:pointer">REGISTER</span></p>
        </div>
        <div id="regForm" style="display:none;">
            <input type="text" id="uR" class="form-control mb-3 bg-transparent text-white border-info" placeholder="NEW_ID">
            <input type="password" id="pR" class="form-control mb-4 bg-transparent text-white border-info" placeholder="NEW_ACCESS">
            <button class="btn btn-info w-100 py-2 fw-bold" onclick="doReg()">INITIALIZE</button>
            <p class="text-center mt-3 small"><span class="text-info" onclick="toggleAuth(false)" style="cursor:pointer">BACK_TO_LOGIN</span></p>
        </div>
    </div>
</div>

<div id="mainApp">
    <section id="sec-home" class="active-sec">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="text-info m-0">LIVE_MARKET</h5>
            <h5 class="text-warning m-0" id="labelSaldo">Rp 0</h5>
        </div>
        <div id="tradingChart" class="glass mb-4" style="height:200px;"></div>
        <h6 class="text-info mb-3">60_AVAILABLE_STOCKS</h6>
        <div class="stock-grid" id="stockContainer"></div>
    </section>

    <section id="sec-mission">
        <h5 class="text-info mb-4">ACTIVE_CONTRACTS</h5>
        <div id="activeList"><p class="text-center text-secondary">No active contracts.</p></div>
    </section>

    <section id="sec-wallet">
        <h5 class="text-info mb-4">WALLET_SYSTEM</h5>
        <div class="glass p-3 mb-4">
            <div class="row g-2 mb-3">
                <div class="col-6" onclick="openDepo('DANA')"><div class="p-3 border border-info text-center"><i class="fas fa-wallet"></i> DANA</div></div>
                <div class="col-6" onclick="openDepo('QRIS')"><div class="p-3 border border-warning text-center"><i class="fas fa-qrcode"></i> QRIS</div></div>
            </div>
            <div id="depoBox" style="display:none;">
                <p id="depoGuide" class="small text-info"></p>
                <input type="number" id="depoAmt" class="form-control mb-2 bg-dark text-white" placeholder="Nominal">
                <input type="file" id="depoFile" class="form-control mb-2 bg-dark">
                <button class="btn btn-info w-100 btn-sm" onclick="submitDepo()">SUBMIT PROOF</button>
            </div>
        </div>
        <h6 class="text-info mb-3">WITHDRAW_FUNDS</h6>
        <div class="glass p-3">
            <input type="number" id="wdAmt" class="form-control mb-2 bg-dark text-white" placeholder="Nominal WD">
            <button class="btn btn-warning w-100" onclick="doWD()">EXECUTE WITHDRAW</button>
        </div>
    </section>

    <section id="sec-prof">
        <div class="text-center mb-4">
            <img id="adminTrigger" src="https://api.dicebear.com/7.x/pixel-art/svg?seed=Daniel" class="rounded-circle border border-info" style="width:80px;" onclick="checkAdmin()">
            <h5 class="text-info mt-2" id="profName">...</h5>
        </div>
        <div class="glass p-3 mb-2">
            <label class="small">LINK_BANK / E-WALLET</label>
            <select id="userBank" class="form-control bg-dark text-white mb-2">
                <option value="DANA">DANA</option>
                <option value="GOPAY">GOPAY</option>
                <option value="BCA">BANK BCA</option>
            </select>
            <input type="text" id="userRek" class="form-control bg-dark text-white mb-2" placeholder="Nomor Rekening">
            <button class="btn btn-info btn-sm w-100" onclick="saveBank()">UPDATE DATA</button>
        </div>
        <button class="btn btn-danger w-100 mt-5" onclick="logout()">TERMINATE</button>
    </section>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="nav('sec-home', this)"><i class="fas fa-chart-line fa-lg"></i><br>TRADE</div>
        <div class="nav-item" onclick="nav('sec-mission', this)"><i class="fas fa-tasks fa-lg"></i><br>MISSION</div>
        <div class="nav-item" onclick="nav('sec-wallet', this)"><i class="fas fa-wallet fa-lg"></i><br>WALLET</div>
        <div class="nav-item" onclick="nav('sec-prof', this)"><i class="fas fa-user-gear fa-lg"></i><br>PROFILE</div>
    </div>
    <div style="position:fixed; bottom: 80px; right: 15px; z-index:9999">
        <button class="btn btn-info rounded-circle" onclick="toggleChat()"><i class="fas fa-headset"></i></button>
    </div>
</div>

<div id="adminPanel">
    <h3 class="text-warning">TITAN_ADMIN_V8.2</h3>
    <div id="adminList"></div>
    <button class="btn btn-outline-info w-100 mt-4" onclick="closeAdmin()">BACK TO APP</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCwrvbPBNwB0r7PSdFBqa4wS2gag-MmpDE",
        authDomain: "my-invest-database.firebaseapp.com",
        databaseURL: "https://my-invest-database-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "my-invest-database",
        storageBucket: "my-invest-database.firebasestorage.app",
        messagingSenderId: "397898231978",
        appId: "1:397898231978:web:ecf7ff6b9682f5e0b660d3"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // -- LOGIN / SESSION LOGIC --
    const session = localStorage.getItem("uSess");

    window.onload = () => {
        if (session && session !== "undefined") {
            db.ref('users/' + session).once('value', s => {
                if(s.exists()) {
                    startApp();
                } else {
                    localStorage.clear();
                    showAuth();
                }
            });
        } else {
            showAuth();
        }
    };

    function showAuth() {
        document.getElementById('authPage').style.display = 'flex';
        document.getElementById('mainApp').style.display = 'none';
    }

    function startApp() {
        document.getElementById('authPage').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('profName').innerText = session;
        renderStocks(); syncData(); initChart();
        document.body.addEventListener('click', () => { document.getElementById('bgMusic').play(); }, {once:true});
    }

    function doLogin() {
        const u = document.getElementById('uL').value.trim();
        const p = document.getElementById('pL').value.trim();
        if(!u || !p) return alert("Isi Data!");
        db.ref('users/' + u).once('value', s => {
            if(s.exists() && s.val().password === p) {
                localStorage.setItem("uSess", u);
                location.reload();
            } else alert("AKSES DITOLAK");
        });
    }

    function doReg() {
        const u = document.getElementById('uR').value.trim();
        const p = document.getElementById('pR').value.trim();
        if(!u || !p) return alert("Isi Data!");
        db.ref('users/' + u).once('value', s => {
            if(s.exists()) alert("ID SUDAH ADA");
            else {
                db.ref('users/' + u).set({password:p, saldo:0}).then(() => {
                    localStorage.setItem("uSess", u);
                    location.reload();
                });
            }
        });
    }

    // -- 60 STOCKS LOGIC --
    const stocks = [];
    for(let i=1; i<=60; i++) {
        stocks.push({
            id: i, name: `TITAN_V${i}`, price: 10000*i, daily: 2000+(i*100), 
            contract: 30, img: `https://picsum.photos/seed/cyber${i}/200/120`
        });
    }

    function renderStocks() {
        const cont = document.getElementById('stockContainer');
        cont.innerHTML = stocks.map(s => `
            <div class="stock-card">
                <img src="${s.img}">
                <div class="small fw-bold mt-1">${s.name}</div>
                <div class="small text-warning">Rp ${s.price.toLocaleString()}</div>
                <button class="btn btn-cyber w-100 btn-sm mt-2" onclick="buyStock(${s.id})">KONTRAK</button>
            </div>
        `).join('');
    }

    function buyStock(id) {
        const s = stocks.find(x => x.id === id);
        db.ref('users/'+session+'/saldo').once('value', val => {
            if((val.val() || 0) >= s.price) {
                db.ref('users/'+session).update({saldo: val.val() - s.price});
                db.ref('users/'+session+'/contracts/C'+Date.now()).set({
                    name: s.name, daily: s.daily, missions_today: 0, days_left: s.contract
                });
                alert("KONTRAK DIMULAI!");
            } else alert("SALDO KURANG");
        });
    }

    // -- MISSION & CHART LOGIC --
    function initChart() {
        const chart = LightweightCharts.createChart(document.getElementById('tradingChart'), {
            layout: { backgroundColor: 'transparent', textColor: '#00f3ff' },
            grid: { vertLines: { color: '#111' }, horzLines: { color: '#111' } },
        });
        const lineSeries = chart.addLineSeries({ color: '#00f3ff' });
        let base = 100;
        setInterval(() => {
            base += (Math.random() - 0.48) * 5;
            lineSeries.update({ time: Date.now() / 1000, value: base });
        }, 2000);
    }

    function syncData() {
        db.ref('users/'+session+'/saldo').on('value', s => {
            document.getElementById('labelSaldo').innerText = "Rp " + (s.val() || 0).toLocaleString();
        });
        db.ref('users/'+session+'/contracts').on('value', s => {
            const list = document.getElementById('activeList');
            if(!s.exists()) return;
            list.innerHTML = "";
            s.forEach(c => {
                const d = c.val();
                list.innerHTML += `<div class="glass p-3 mb-2">
                    <b>${d.name}</b> <small class="text-info">${d.days_left} Hari</small>
                    <button class="btn btn-cyber btn-sm d-block mt-2" onclick="doMission('${c.key}')" ${d.missions_today >= 3 ? 'disabled' : ''}>
                        MISI (${d.missions_today}/3)
                    </button>
                </div>`;
            });
        });
    }

    function doMission(cid) {
        db.ref('users/'+session+'/contracts/'+cid).once('value', s => {
            const d = s.val();
            const next = d.missions_today + 1;
            db.ref('users/'+session+'/contracts/'+cid).update({missions_today: next});
            if(next === 3) {
                db.ref('users/'+session+'/saldo').once('value', sv => {
                    db.ref('users/'+session).update({saldo: sv.val() + d.daily});
                });
                alert("PROFIT CAIR!");
            }
        });
    }

    // -- UI HELPERS --
    function nav(id, el) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active-sec'));
        document.getElementById(id).classList.add('active-sec');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }
    function toggleAuth(r) {
        document.getElementById('loginForm').style.display = r?'none':'block';
        document.getElementById('regForm').style.display = r?'block':'none';
    }
    function toggleChat() { 
        const c = document.getElementById('chatWindow');
        c.style.display = (c.style.display === 'flex')?'none':'flex'; 
    }
    function logout() { localStorage.clear(); location.reload(); }

    // -- ADMIN LOGIC --
    let adminHits = 0;
    function checkAdmin() {
        adminHits++;
        if(adminHits >= 5) document.getElementById('adminPanel').style.display = 'block';
    }
    function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; adminHits = 0; }
</script>
</body>
</html>
