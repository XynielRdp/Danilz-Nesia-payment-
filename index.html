<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAYMENT METODE BY DANILZ NESIA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background: #0b0c10; color: #fff; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gold { background: linear-gradient(135deg, #FFD700 0%, #B8860B 100%); color: #000; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="max-w-md w-full glass rounded-[2rem] p-6 shadow-2xl">
        <div class="text-center mb-6">
            <h1 class="text-xl font-black italic tracking-tighter" style="color:#FFD700">PAYMENT METODE BY DANILZ NESIA</h1>
            <p class="text-[10px] text-gray-500 uppercase tracking-widest mt-1">Official Gateway</p>
        </div>

        <div class="mb-4">
            <label class="text-[10px] text-gray-400 uppercase font-bold ml-1">Nominal</label>
            <input type="number" id="amt" placeholder="Min 1,000" oninput="upd()" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 outline-none focus:border-yellow-500 text-lg font-bold mt-1">
        </div>

        <div class="bg-white/5 rounded-xl p-4 mb-6 text-sm space-y-2">
            <div class="flex justify-between text-gray-400"><span>Admin (Flat)</span><span>Rp 100</span></div>
            <div class="flex justify-between font-bold text-yellow-500 pt-2 border-t border-white/10"><span>Total</span><span id="tot">Rp 0</span></div>
        </div>

        <div class="grid grid-cols-2 gap-2 mb-6">
            <button onclick="sel('q')" class="p-3 border border-white/10 rounded-xl hover:bg-white/10 transition-all focus:bg-yellow-500/20 focus:border-yellow-500"><p class="text-xs font-bold">QRIS</p></button>
            <button onclick="sel('m')" class="p-3 border border-white/10 rounded-xl hover:bg-white/10 transition-all focus:bg-yellow-500/20 focus:border-yellow-500"><p class="text-xs font-bold">MANUAL</p></button>
        </div>

        <div id="qris" class="hidden bg-white p-3 rounded-2xl mb-6 flex flex-col items-center">
            <p class="text-black text-[9px] font-bold mb-2">DANILZ STORE - ID1026482706839</p>
            <img src="https://i.ibb.co.com/NgBfCbBM/1000795750.png" class="w-full h-auto rounded-lg">
        </div>

        <div id="man" class="hidden bg-yellow-500/10 border border-yellow-500/20 p-4 rounded-xl mb-6 text-center">
            <p class="text-[10px] text-gray-400 font-bold uppercase">Nomor Tujuan</p>
            <p class="text-lg font-black text-white">085714438874</p>
        </div>

        <button onclick="pay()" class="gold w-full py-4 rounded-xl font-black uppercase text-sm tracking-widest shadow-lg active:scale-95 transition-all">Konfirmasi Pembayaran</button>
    </div>

    <script>
        function upd() {
            let v = document.getElementById('amt').value;
            let t = document.getElementById('tot');
            if(v >= 1000) { t.innerText = "Rp " + (parseInt(v) + 100).toLocaleString('id-ID'); } 
            else { t.innerText = "Rp 0"; }
        }
        function sel(m) {
            document.getElementById('qris').classList.toggle('hidden', m !== 'q');
            document.getElementById('man').classList.toggle('hidden', m !== 'm');
        }
        function pay() {
            let v = document.getElementById('amt').value;
            let t = document.getElementById('tot').innerText;
            if(v < 1000) { alert("Minimal Rp 1.000"); return; }
            window.location.href = `https://wa.me/6285714438874?text=Halo Admin Danil, konfirmasi deposit: %0A- Nominal: Rp ${parseInt(v).toLocaleString('id-ID')}%0A- Admin: Rp 100%0A- Total: ${t}`;
        }
    </script>
</body>
</html>
