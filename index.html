    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { --main-bg: #030303; --accent: #ffcc00; --glass: rgba(255, 255, 255, 0.05); }
        
        body { 
            background: var(--main-bg); 
            color: #fff; 
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Animasi Background Bergerak */
        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #030303 100%);
            z-index: -2;
        }
        .blob {
            position: fixed; width: 300px; height: 300px;
            background: rgba(255, 204, 0, 0.1);
            filter: blur(80px); border-radius: 50%; z-index: -1;
            animation: move 20s infinite alternate;
        }
        @keyframes move { from { transform: translate(-10%, -10%); } to { transform: translate(100%, 100%); } }

        /* UI Elements */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.8);
        }

        .btn-gold {
            background: linear-gradient(135deg, #ffcc00, #ff9900);
            color: #000; font-weight: 700; border: none;
            border-radius: 14px; padding: 12px; transition: 0.4s;
        }
        .btn-gold:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255, 204, 0, 0.4); }

        .form-control {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff; border-radius: 12px; padding: 12px;
        }
        .form-control:focus { background: rgba(255,255,255,0.08); border-color: var(--accent); box-shadow: none; color: #fff; }

        .nav-link { color: #888; font-weight: 600; border-radius: 12px !important; }
        .nav-link.active { background: var(--accent) !important; color: #000 !important; }

        #mainDashboard { display: none; padding-top: 20px; }
    </style>
</head>
