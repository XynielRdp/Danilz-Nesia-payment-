
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRANVEST | Daniel Tech</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffcc00; --dark: #01080e; }
        body { background: var(--dark); color: white; font-family: sans-serif; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        
        /* Navigasi Bawah */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 10px; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { color: #777; text-align: center; text-decoration: none; font-size: 10px; cursor: pointer; }
        .nav-item.active { color: var(--gold); }

        /* Sembunyikan semua section dulu */
        section { display: none; padding: 20px; padding-bottom: 80px; }
        .active-section { display: block !important; }
        
        /* Tombol Emas */
        .btn-gold { background: var(--gold); color: black; font-weight: bold; border: none; border-radius: 8px; padding: 10px; }
    </style>
</head>
<body>

<div id="authSection" style="display: none; min-height: 100vh;" class="container flex-column align-items-center justify-content-center">
    <div class="glass p-4 w-100" style="max-width: 350px;">
        <h3 class="text-center text-warning fw-bold mb-4">IRANVEST</h3>
        <div id="loginBox">
            <input type="text" id="userL" class="form-control mb-3 bg-dark text-white border-secondary" placeholder="Username">
            <input type="password" id="passL" class="form-control mb-3 bg-dark text-white border-secondary" placeholder="Password">
            <button class="btn btn-gold w-100" onclick="handleLogin()">MASUK</button>
            <p class="text-center mt-3 small">Baru? <a href="javascript:void(0)" class="text-warning" onclick="toggleAuth(true)">Daftar Akun</a></p>
        </div>
        <div id="regBox" style="display: none;">
            <input type="text" id="userR" class="form-control mb-3 bg-dark text-white border-secondary" placeholder="Username Baru">
            <input type="password" id="passR" class="form-control mb-3 bg-dark text-white border-secondary" placeholder="Password Baru">
            <button class="btn btn-gold w-100" onclick="handleRegister()">DAFTAR SEKARANG</button>
            <p class="text-center mt-3 small">Ada akun? <a href="javascript:void(0)" class="text-warning" onclick="toggleAuth(false)">Login</a></p>
        </div>
    </div>
</div>

<div id="mainApp" style="display: none;">
    <div class="container py-3 d-flex justify-content-between">
        <span class="fw-bold text-warning small">💎 DANIEL TECHNOLOGY</span>
        <span class="badge bg-dark border border-secondary" id="displayUser">User</span>
    </div>

    <section id="sec-home" class="active-section">
        <div class="glass p-4 text-center mb-4">
            <small class="text-secondary">SALDO AKTIF</small>
            <h2 class="fw-bold" id="valSaldo">Rp 0</h2>
        </div>
        <h6 class="fw-bold mb-3">PAKET INVESTASI</h6>
        <div id="productContainer"></div>
    </section>

    <section id="sec-depo">
        <h6 class="fw-bold mb-3">PILIH NOMINAL DEPOSIT</h6>
        <div class="row g-2">
            <div class="col-6"><button class="btn glass w-100 text-white p-3" onclick="doDepo(10000)">10k</button></div>
            <div class="col-6"><button class="btn glass w-100 text-white p-3" onclick="doDepo(50000)">50k</button></div>
            <div class="col-12"><button class="btn btn-gold w-100" onclick="doDepo(1000000)">1 JUTA (VIP)</button></div>
        </div>
    </section>

    <section id="sec-wd">
        <h6 class="fw-bold mb-3">PENARIKAN DANA</h6>
        <div class="glass p-3">
            <select id="amtWD" class="form-select bg-dark text-white border-secondary mb-3">
                <option value="50000">Rp 50.000</option>
                <option value="100000">Rp 100.000</option>
            </select>
            <input type="text" id="targetWD" class="form-control bg-dark text-white border-secondary mb-3" placeholder="No Rek / DANA">
            <button class="btn btn-gold w-100" onclick="doWD()">TARIK DANA</button>
        </div>
    </section>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="go('sec-home', this)"><i class="fas fa-home fa-lg"></i><br>Beranda</div>
        <div class="nav-item" onclick="go('sec-depo', this)"><i class="fas fa-wallet fa-lg"></i><br>Deposit</div>
        <div class="nav-item" onclick="go('sec-wd', this)"><i class="fas fa-money-bill fa-lg"></i><br>Withdraw</div>
        <div class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt fa-lg"></i><br>Keluar</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCwrvbPBNwB0r7PSdFBqa4wS2gag-MmpDE",
        authDomain: "my-invest-database.firebaseapp.com",
        databaseURL: "https://my-invest-database-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "my-invest-database",
        storageBucket: "my-invest-database.firebasestorage.app",
        messagingSenderId: "397898231978",
        appId: "1:397898231978:web:ecf7ff6b9682f5e0b660d3"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const session = localStorage.getItem("uSess");

    // LOGIKA TAMPILAN AWAL (KUNCI UTAMA)
    if (session) {
        document.getElementById('authSection').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('displayUser').innerText = session;
        loadUserData();
    } else {
        document.getElementById('authSection').style.setProperty('display', 'flex', 'important');
        document.getElementById('mainApp').style.display = 'none';
    }

    function toggleAuth(isReg) {
        document.getElementById('loginBox').style.display = isReg ? 'none' : 'block';
        document.getElementById('regBox').style.display = isReg ? 'block' : 'none';
    }

    function handleLogin() {
        const u = document.getElementById('userL').value;
        const p = document.getElementById('passL').value;
        db.ref('users/' + u).once('value', s => {
            if (s.exists() && s.val().password === p) {
                localStorage.setItem("uSess", u);
                location.reload();
            } else alert("Login Gagal!");
        });
    }

    function handleRegister() {
        const u = document.getElementById('userR').value;
        const p = document.getElementById('passR').value;
        if(u && p) {
            db.ref('users/' + u).set({ username: u, password: p, saldo: 0 })
            .then(() => { alert("Daftar Berhasil!"); location.reload(); });
        }
    }

    function go(id, el) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active-section'));
        document.getElementById(id).classList.add('active-section');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    function loadUserData() {
        db.ref('users/' + session + '/saldo').on('value', s => {
            document.getElementById('valSaldo').innerText = "Rp " + (s.val() || 0).toLocaleString();
        });
    }

    function doDepo(amt) {
        db.ref('transactions/' + session + '/T' + Date.now()).set({ type: "DEPO", amount: amt, status: "PENDING" })
        .then(() => alert("Laporan deposit terkirim!"));
    }

    function doWD() {
        const amt = document.getElementById('amtWD').value;
        const target = document.getElementById('targetWD').value;
        if(!target) return alert("Isi nomor tujuan!");
        db.ref('transactions/' + session + '/T' + Date.now()).set({ type: "WD", amount: amt, target: target, status: "PROSES" })
        .then(() => alert("Permintaan tarik dana diproses!"));
    }

    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
