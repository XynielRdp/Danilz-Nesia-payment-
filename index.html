<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRANVEST DIAMOND | Daniel Tech</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --gold: #ffcc00; --dark: #01080e; --glass: rgba(255, 255, 255, 0.07); }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        
        .glass-card { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; }
        .btn-gold { background: linear-gradient(45deg, #ffcc00, #ff9900); color: black; font-weight: bold; border: none; border-radius: 12px; padding: 10px; }
        
        /* Navigasi Bawah */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #01080e; border-top: 1px solid var(--glass); display: flex; justify-content: space-around; padding: 12px 0; z-index: 999; }
        .nav-item { color: #666; text-decoration: none; text-align: center; font-size: 11px; cursor: pointer; }
        .nav-item.active { color: var(--gold); }

        section { display: none; padding: 20px 15px 100px 15px; }
        .active-section { display: block !important; }

        .prod-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 15px; padding: 15px; margin-bottom: 12px; }
        .chat-box { height: 300px; overflow-y: auto; background: rgba(0,0,0,0.4); border-radius: 15px; padding: 15px; }
    </style>
</head>
<body>

<div id="authPage" class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="glass-card w-100" style="max-width: 380px;">
        <h2 class="text-center text-warning fw-bold mb-4">IRANVEST</h2>
        
        <div id="loginForm">
            <input type="text" id="userL" class="form-control mb-3 bg-dark text-white border-secondary" placeholder="Username">
            <input type="password" id="passL" class="form-control mb-3 bg-dark text-white border-secondary" placeholder="Password">
            <button class="btn btn-gold w-100" onclick="doLogin()">MASUK</button>
            <p class="text-center mt-3 small">Belum punya akun? <a href="javascript:void(0)" class="text-warning" onclick="toggleReg(true)">Daftar Akun</a></p>
        </div>

        <div id="regForm" style="display:none;">
            <input type="text" id="userR" class="form-control mb-3 bg-dark text-white border-secondary" placeholder="Username Baru">
            <input type="password" id="passR" class="form-control mb-3 bg-dark text-white border-secondary" placeholder="Password Baru">
            <button class="btn btn-gold w-100" onclick="doReg()">DAFTAR SEKARANG</button>
            <p class="text-center mt-3 small">Sudah ada akun? <a href="javascript:void(0)" class="text-warning" onclick="toggleReg(false)">Login</a></p>
        </div>
    </div>
</div>

<div id="appPage" style="display: none;">
    <div class="container py-3 d-flex justify-content-between align-items-center">
        <span class="fw-bold text-warning">DANIEL TECH</span>
        <span class="badge bg-secondary" id="uName">User</span>
    </div>

    <section id="home" class="active-section">
        <div class="glass-card text-center mb-4">
            <p class="text-secondary small mb-1">TOTAL SALDO</p>
            <h1 class="fw-bold" id="uSaldo">Rp 0</h1>
        </div>
        <h6 class="fw-bold mb-3">LIST PRODUK</h6>
        <div id="listProduk"><p class="small text-secondary">Memuat data...</p></div>
    </section>

    <section id="deposit">
        <h5 class="fw-bold mb-4">Deposit Saldo</h5>
        <div class="row g-2">
            <div class="col-6"><button class="btn glass-card w-100 text-white" onclick="reqDep(10000)">10k</button></div>
            <div class="col-6"><button class="btn glass-card w-100 text-white" onclick="reqDep(20000)">20k</button></div>
            <div class="col-6"><button class="btn glass-card w-100 text-white" onclick="reqDep(50000)">50k</button></div>
            <div class="col-6"><button class="btn glass-card w-100 text-white" onclick="reqDep(100000)">100k</button></div>
            <div class="col-12"><button class="btn btn-gold w-100" onclick="reqDep(1000000)">Rp 1.000.000</button></div>
        </div>
    </section>

    <section id="withdraw">
        <h5 class="fw-bold mb-4">Penarikan Dana</h5>
        <div class="glass-card">
            <select id="amtWD" class="form-select bg-dark text-white border-secondary mb-3">
                <option value="50000">Rp 50.000</option>
                <option value="100000">Rp 100.000</option>
                <option value="1000000">Rp 1.000.000</option>
            </select>
            <input type="text" id="bankWD" class="form-control bg-dark text-white border-secondary mb-3" placeholder="No Rek / DANA">
            <button class="btn btn-gold w-100" onclick="reqWD()">TARIK SEKARANG</button>
        </div>
    </section>

    <section id="chat">
        <h5 class="fw-bold mb-3">Live Support</h5>
        <div class="chat-box mb-3" id="boxChat"></div>
        <div class="input-group">
            <input type="text" id="inChat" class="form-control bg-dark text-white border-secondary" placeholder="Tulis...">
            <button class="btn btn-gold" onclick="sendChat()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </section>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="go('home', this)"><i class="fas fa-home fa-lg"></i><br>Home</div>
        <div class="nav-item" onclick="go('deposit', this)"><i class="fas fa-wallet fa-lg"></i><br>Deposit</div>
        <div class="nav-item" onclick="go('withdraw', this)"><i class="fas fa-money-bill fa-lg"></i><br>WD</div>
        <div class="nav-item" onclick="go('chat', this)"><i class="fas fa-comment-dots fa-lg"></i><br>Chat</div>
        <div class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt fa-lg"></i><br>Keluar</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCwrvbPBNwB0r7PSdFBqa4wS2gag-MmpDE",
        authDomain: "my-invest-database.firebaseapp.com",
        databaseURL: "https://my-invest-database-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "my-invest-database",
        storageBucket: "my-invest-database.firebasestorage.app",
        messagingSenderId: "397898231978",
        appId: "1:397898231978:web:ecf7ff6b9682f5e0b660d3"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let sess = localStorage.getItem("uSess");

    // AUTH LOGIC
    function toggleReg(s) {
        document.getElementById('loginForm').style.display = s ? 'none' : 'block';
        document.getElementById('regForm').style.display = s ? 'block' : 'none';
    }

    window.doReg = function() {
        const u = document.getElementById('userR').value;
        const p = document.getElementById('passR').value;
        if(!u || !p) return alert("Isi semua!");
        db.ref('users/'+u).set({username:u, password:p, saldo:0}).then(()=>{
            alert("Berhasil! Silakan Login.");
            location.reload();
        });
    }

    window.doLogin = function() {
        const u = document.getElementById('userL').value;
        const p = document.getElementById('passL').value;
        db.ref('users/'+u).once('value', s => {
            if(s.exists() && s.val().password === p) {
                localStorage.setItem("uSess", u);
                location.reload();
            } else alert("User/Pass salah!");
        });
    }

    // NAV LOGIC
    window.go = function(id, el) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active-section'));
        document.getElementById(id).classList.add('active-section');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    // CORE DATA
    if(sess) {
        document.getElementById('authPage').style.display = 'none';
        document.getElementById('appPage').style.display = 'block';
        document.getElementById('uName').innerText = sess;

        // Saldo
        db.ref('users/'+sess+'/saldo').on('value', s => {
            document.getElementById('uSaldo').innerText = "Rp " + (s.val() || 0).toLocaleString();
        });

        // Produk
        db.ref('stockproduct').on('value', s => {
            const list = document.getElementById('listProduk');
            list.innerHTML = "";
            if(!s.exists()) list.innerHTML = "<p class='small text-secondary'>Belum ada paket.</p>";
            s.forEach(p => {
                const d = p.val();
                list.innerHTML += `
                <div class="prod-card d-flex justify-content-between align-items-center">
                    <div><h6 class="m-0">${d.nama}</h6><small class="text-warning">Profit: ${d.profit}%</small></div>
                    <div class="text-end">
                        <small class="d-block mb-1">Rp ${parseInt(d.harga).toLocaleString()}</small>
                        <button class="btn btn-sm btn-gold px-3" onclick="alert('Saldo tidak cukup')">BELI</button>
                    </div>
                </div>`;
            });
        });

        // Transaksi
        window.reqDep = (a) => {
            db.ref('transactions/'+sess+'/T'+Date.now()).set({type:"DEPOSIT", amount:a, status:"PENDING", date:new Date().toLocaleDateString()})
            .then(()=>alert("Request Terkirim!"));
        }

        window.reqWD = () => {
            const a = document.getElementById('amtWD').value;
            const b = document.getElementById('bankWD').value;
            if(!b) return alert("Isi nomor tujuan!");
            db.ref('transactions/'+sess+'/T'+Date.now()).set({type:"WITHDRAW", amount:a, target:b, status:"PROSES", date:new Date().toLocaleDateString()})
            .then(()=>alert("WD Diproses!"));
        }

        // Chat
        window.sendChat = () => {
            const t = document.getElementById('inChat').value;
            if(!t) return;
            db.ref('chats/'+sess+'/M'+Date.now()).set({sender:sess, text:t, time:new Date().toLocaleTimeString()});
            document.getElementById('inChat').value = "";
        }

        db.ref('chats/'+sess).on('value', s => {
            const box = document.getElementById('boxChat');
            box.innerHTML = "";
            s.forEach(m => {
                const d = m.val();
                const me = d.sender === sess;
                box.innerHTML += `<div class="mb-2 ${me?'text-end':''}">
                    <div class="p-2 d-inline-block rounded-3 small" style="background:${me?'#ffcc00':'#333'};color:${me?'#000':'#fff'}">${d.text}</div>
                </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    window.logout = () => { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
