<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRANVESTMENT GOLD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0a; --card: #161616; --gold: #c49b3b; --gold-l: #f1d592; --white: #ffffff; }
        body { background-color: var(--bg); color: var(--white); font-family: 'Poppins', sans-serif; margin: 0; }
        #authSection { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--card); border: 1px solid var(--gold); padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; }
        #mainDashboard { display: none; }
        .dashboard { max-width: 600px; margin: 20px auto; background: linear-gradient(135deg, #161616 0%, #252525 100%); border: 1px solid var(--gold); border-radius: 20px; padding: 25px; }
        .btn-main { background: linear-gradient(45deg, var(--gold), var(--gold-l)); color: black; font-weight: 700; border: none; width: 100%; padding: 12px; border-radius: 10px; transition: 0.3s; }
        .btn-main:hover { transform: scale(1.02); opacity: 0.9; }
        .form-control { background: #000; border: 1px solid #333; color: white; margin-bottom: 15px; }
        .form-control:focus { background: #000; color: white; border-color: var(--gold); box-shadow: none; }
        .live-chat { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; z-index: 1000; text-decoration: none; }
    </style>
</head>
<body>

<div id="authSection">
    <div class="auth-card">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-warning">IRANVEST GOLD</h3>
            <p class="text-muted small" id="statusText">Silahkan Masuk/Daftar</p>
        </div>
        
        <div id="authForm">
            <input type="text" id="username" class="form-control" placeholder="Username (Tanpa Spasi)">
            <input type="password" id="password" class="form-control" placeholder="Password">
            <button class="btn-main w-100 mb-2" onclick="handleLogin()">MASUK</button>
            <button class="btn btn-outline-warning w-100" onclick="handleRegister()">DAFTAR AKUN BARU</button>
        </div>
    </div>
</div>

<div id="mainDashboard">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container d-flex justify-content-between">
            <span class="navbar-brand fw-bold text-warning">IRANVEST</span>
            <button class="btn btn-sm btn-danger" onclick="logout()">Keluar</button>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="dashboard">
            <p class="text-secondary mb-0 small">Halo, <span id="uName">User</span></p>
            <h2 id="uSaldo" style="color: var(--gold-l); font-weight: 700;">Rp 0</h2>
            <hr class="border-secondary">
            <div class="row text-center">
                <div class="col-6 border-end border-secondary" onclick="alert('Hubungi Admin di WhatsApp untuk Deposit')">
                    <i class="fas fa-plus-circle text-warning mb-1"></i><br><small>Isi Saldo</small>
                </div>
                <div class="col-6" onclick="alert('Minimal saldo tarik Rp 50.000')">
                    <i class="fas fa-paper-plane text-warning mb-1"></i><br><small>Tarik Dana</small>
                </div>
            </div>
        </div>
        
        <div class="text-center mt-5">
            <h5 class="fw-bold text-warning">PAKET INVESTASI</h5>
            <div class="p-3 bg-dark border border-secondary rounded mb-3">
                <h6>Bronze Pack</h6>
                <p class="text-warning fw-bold mb-1">Rp 100.000</p>
                <small>Profit 1.5% / Hari</small><br>
                <button class="btn btn-sm btn-warning mt-2 w-100" onclick="window.open('https://wa.me/6285692069556')">BELI SEKARANG</button>
            </div>
        </div>
    </div>
</div>

<a href="https://wa.me/6285692069556" class="live-chat" target="_blank"><i class="fab fa-whatsapp"></i></a>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // Konfigurasi Database Daniel
    const firebaseConfig = {
        apiKey: "AIzaSyCwrvbPBNwB0r7PSdFBqa4wS2gag-MmpDE",
        authDomain: "my-invest-database.firebaseapp.com",
        databaseURL: "https://my-invest-database-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "my-invest-database",
        storageBucket: "my-invest-database.firebasestorage.app",
        messagingSenderId: "397898231978",
        appId: "1:397898231978:web:ecf7ff6b9682f5e0b660d3"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Fungsi Registrasi
    function handleRegister() {
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value.trim();

        if (user == "" || pass == "") return alert("Isi Username dan Password!");

        db.ref('users/' + user).once('value').then((snapshot) => {
            if (snapshot.exists()) {
                alert("Username sudah ada, silahkan ganti yang lain.");
            } else {
                db.ref('users/' + user).set({
                    username: user,
                    password: pass,
                    saldo: 0
                }).then(() => {
                    alert("Pendaftaran Berhasil! Sekarang klik tombol MASUK.");
                });
            }
        }).catch(err => alert("Error: " + err.message));
    }

    // Fungsi Login
    function handleLogin() {
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value.trim();

        db.ref('users/' + user).once('value').then((snapshot) => {
            const data = snapshot.val();
            if (data && data.password === pass) {
                localStorage.setItem("userLoggedIn", user);
                checkSession();
            } else {
                alert("Username atau Password salah!");
            }
        });
    }

    // Cek Session Login
    function checkSession() {
        const session = localStorage.getItem("userLoggedIn");
        if (session) {
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('mainDashboard').style.display = 'block';
            db.ref('users/' + session).on('value', (snapshot) => {
                const data = snapshot.val();
                document.getElementById('uName').innerText = data.username;
                document.getElementById('uSaldo').innerText = "Rp " + parseInt(data.saldo).toLocaleString('id-ID');
            });
        }
    }

    function logout() {
        localStorage.removeItem("userLoggedIn");
        location.reload();
    }

    window.onload = checkSession;
</script>
</body>
</html>
