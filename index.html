<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT DANIEL TECHNOLOGY</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #030d16; color: white; font-family: sans-serif; }
        .glass-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .btn-gold { background: #008080; color: white; border: none; border-radius: 10px; padding: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container mt-4">
    <div class="glass-card text-center">
        <h6 class="text-success small">SYSTEM ONLINE</h6>
        <h4 class="fw-bold">PT DANIEL TECHNOLOGY.it</h4>
        <hr>
        <p class="mb-1 small text-secondary">SALDO AKTIF</p>
        <h2 id="uSaldo" class="fw-bold">Rp 0</h2>
        <div class="d-flex justify-content-around mt-3">
            <button class="btn btn-outline-info rounded-circle p-3" data-bs-toggle="modal" data-bs-target="#mDepo">
                <i class="fas fa-arrow-down"></i>
            </button>
        </div>
    </div>
</div>

<div class="modal fade" id="mDepo" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark border-secondary">
            <div class="modal-body text-center">
                <h5 class="text-warning fw-bold mb-3">Deposit Baru</h5>
                <p class="small">Transfer ke DANA: 0857-1443-8874</p>
                <input type="number" id="amtDep" class="form-control mb-3 bg-dark text-white" placeholder="Nominal Rp">
                <button class="btn-gold w-100" onclick="reqDep()">KONFIRMASI BAYAR</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Konfigurasi Database Singapore kamu
    const firebaseConfig = {
        apiKey: "AIzaSyCwrvbPBNwB0r7PSdFBqa4wS2gag-MmpDE",
        authDomain: "my-invest-database.firebaseapp.com",
        databaseURL: "https://my-invest-database-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "my-invest-database",
        storageBucket: "my-invest-database.firebasestorage.app",
        messagingSenderId: "397898231978",
        appId: "1:397898231978:web:ecf7ff6b9682f5e0b660d3"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let session = localStorage.getItem("uSess") || "guest";

    function reqDep() {
        const a = document.getElementById('amtDep').value;
        if(a < 1000) return alert("Min Rp 1.000");
        db.ref('transactions/' + session + '/DEP' + Date.now()).set({
            type: "DEPOSIT", amount: a, status: "PENDING", date: new Date().toLocaleDateString()
        }).then(() => {
            alert("Laporan deposit dikirim!");
            location.reload();
        });
    }

    // Menampilkan Saldo dari Firebase
    db.ref('users/' + session).on('value', s => {
        if(s.val()) document.getElementById('uSaldo').innerText = "Rp " + parseInt(s.val().saldo).toLocaleString();
    });
</script>
</body>
</html>
