<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IRANVEST ELITE | Daniel Tech</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap');

        :root { 
            --ex-yellow: #ffec00; --ex-black: #0a0a0a; --ex-gray: #161616; 
            --ex-up: #00d09c; --ex-down: #f6465d;
        }

        body { background: var(--ex-black); color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }

        /* ANTI-STUCK LAYERING */
        #authScreen { position: fixed; inset: 0; background: var(--ex-black); z-index: 10000; display: none; align-items: center; justify-content: center; }
        #mainScreen { display: none; }

        .ex-card { background: var(--ex-gray); border-radius: 12px; border: 1px solid #252525; padding: 15px; margin-bottom: 12px; }
        .btn-ex { background: var(--ex-yellow); color: #000; border: none; border-radius: 8px; font-weight: 700; width: 100%; padding: 12px; transition: 0.2s; }
        .btn-ex:active { transform: scale(0.95); }

        /* MINING SYSTEM */
        .mining-orb { width: 130px; height: 130px; border: 2px solid var(--ex-yellow); border-radius: 50%; margin: 15px auto; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; background: radial-gradient(circle, rgba(255,236,0,0.05), transparent); }
        .orb-inner { font-weight: bold; color: var(--ex-yellow); font-size: 18px; }
        
        /* NAVIGATION */
        .ex-nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #222; z-index: 999; }
        .nav-link { color: #666; text-decoration: none; font-size: 10px; text-align: center; cursor: pointer; }
        .nav-link.active { color: var(--ex-yellow); }

        /* MENU TITIK TIGA */
        .top-bar { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .dropdown-menu { background: var(--ex-gray); border: 1px solid #333; }
        .dropdown-item { color: #fff; font-size: 14px; }
        .dropdown-item:hover { background: #222; color: var(--ex-yellow); }

        section { display: none; padding: 10px 15px 100px; animation: fadeIn 0.3s; }
        .active-section { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* CHAT */
        #chatPanel { position: fixed; bottom: 85px; right: 15px; width: 300px; height: 400px; display: none; flex-direction: column; z-index: 10001; }
    </style>
</head>
<body>

<iframe src="https://www.youtube.com/embed/S_8_K_X0D0Y?autoplay=1&loop=1&playlist=S_8_K_X0D0Y" allow="autoplay" style="display:none"></iframe>

<div id="authScreen">
    <div class="w-100 px-4" style="max-width: 400px;">
        <h1 class="text-center mb-5" style="color:var(--ex-yellow); font-family:'JetBrains Mono';">IRANVEST</h1>
        <div id="loginBox">
            <input type="text" id="uL" class="form-control bg-dark text-white border-secondary mb-3 py-3" placeholder="Account ID">
            <input type="password" id="pL" class="form-control bg-dark text-white border-secondary mb-4 py-3" placeholder="Password">
            <button class="btn-ex" onclick="handleAuth('login')">LOGIN</button>
            <p class="text-center mt-3 small text-secondary" onclick="toggleAuth(true)">Register New Node</p>
        </div>
        <div id="regBox" style="display:none">
            <input type="text" id="uR" class="form-control bg-dark text-white border-secondary mb-3 py-3" placeholder="New ID">
            <input type="password" id="pR" class="form-control bg-dark text-white border-secondary mb-4 py-3" placeholder="New Password">
            <button class="btn-ex" onclick="handleAuth('reg')">CREATE ACCOUNT</button>
            <p class="text-center mt-3 small text-secondary" onclick="toggleAuth(false)">Back to Login</p>
        </div>
    </div>
</div>

<div id="mainScreen">
    <div class="top-bar">
        <h5 class="m-0 fw-bold">IRANVEST <span class="text-warning">PRO</span></h5>
        <div class="dropdown">
            <i class="fas fa-ellipsis-v p-2" id="menuDrop" data-bs-toggle="dropdown" style="cursor:pointer"></i>
            <ul class="dropdown-menu dropdown-menu-end shadow">
                <li><a class="dropdown-item" href="#" onclick="showWDHistory()"><i class="fas fa-history me-2"></i> History Withdraw</a></li>
                <li><a class="dropdown-item" href="#" onclick="toggleChat()"><i class="fas fa-headset me-2"></i> Support</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item text-danger" href="#" onclick="logout()"><i class="fas fa-power-off me-2"></i> Logout</a></li>
            </ul>
        </div>
    </div>

    <section id="sec-trade" class="active-section">
        <div class="ex-card">
            <small class="text-secondary">Total Balance</small>
            <h2 class="fw-bold" id="userBal">Rp 0</h2>
        </div>
        <div id="chart" class="ex-card p-0" style="height:200px; overflow:hidden;"></div>
        <h6 class="mb-3">Market List</h6>
        <div id="stockList" class="row g-2"></div>
    </section>

    <section id="sec-mine">
        <h5 class="mb-4">Mining Terminal</h5>
        <div id="miningList"></div>
    </section>

    <section id="sec-wallet">
        <h5 class="mb-4">Financials</h5>
        <div class="ex-card">
            <button class="btn btn-dark w-100 text-start mb-2 py-3" onclick="showDepo()">
                <i class="fas fa-arrow-down text-success me-2"></i> Deposit Dana
            </button>
            <button class="btn btn-dark w-100 text-start py-3" onclick="showWD()">
                <i class="fas fa-arrow-up text-danger me-2"></i> Withdraw Dana
            </button>
        </div>

        <div id="formWD" class="ex-card" style="display:none">
            <h6>Request Withdrawal</h6>
            <input type="text" id="wdBank" class="form-control bg-dark text-white mb-2" placeholder="Nama Bank/E-Wallet">
            <input type="text" id="wdRek" class="form-control bg-dark text-white mb-2" placeholder="Nomor Rekening">
            <input type="number" id="wdAmt" class="form-control bg-dark text-white mb-3" placeholder="Nominal WD">
            <button class="btn-ex" onclick="processWD()">Konfirmasi WD</button>
        </div>
    </section>

    <div class="modal fade" id="modalHistory" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark text-white border-secondary">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title">Withdraw History</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="wdHistoryList">
                    <p class="text-center text-secondary">Belum ada riwayat penarikan.</p>
                </div>
            </div>
        </div>
    </div>

    <div class="ex-nav">
        <div class="nav-link active" onclick="nav('sec-trade', this)"><i class="fas fa-chart-line fa-lg mb-1"></i><br>Trade</div>
        <div class="nav-link" onclick="nav('sec-mine', this)"><i class="fas fa-hammer fa-lg mb-1"></i><br>Mining</div>
        <div class="nav-link" onclick="nav('sec-wallet', this)"><i class="fas fa-wallet fa-lg mb-1"></i><br>Wallet</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCwrvbPBNwB0r7PSdFBqa4wS2gag-MmpDE",
        authDomain: "my-invest-database.firebaseapp.com",
        databaseURL: "https://my-invest-database-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "my-invest-database",
        storageBucket: "my-invest-database.firebasestorage.app",
        messagingSenderId: "397898231978",
        appId: "1:397898231978:web:ecf7ff6b9682f5e0b660d3"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let session = localStorage.getItem("uSess");

    window.onload = () => {
        if(session) {
            db.ref('users/'+session).once('value', s => {
                if(s.exists()) startSystem();
                else logout();
            });
        } else {
            document.getElementById('authScreen').style.display = 'flex';
        }
    };

    function startSystem() {
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('mainScreen').style.display = 'block';
        
        db.ref('users/'+session+'/saldo').on('value', s => {
            document.getElementById('userBal').innerText = "Rp " + (s.val() || 0).toLocaleString();
        });

        let html = "";
        for(let i=1; i<=60; i++) {
            html += `<div class="col-6"><div class="ex-card p-2 text-center" onclick="buy(${i})">
                <small class="text-secondary">INSTRUMENT ${i}</small>
                <div class="fw-bold">Rp${(10000*i).toLocaleString()}</div>
            </div></div>`;
        }
        document.getElementById('stockList').innerHTML = html;
        initChart(); syncMine();
    }

    // --- AUTH ---
    function toggleAuth(r) {
        document.getElementById('loginBox').style.display = r?'none':'block';
        document.getElementById('regBox').style.display = r?'block':'none';
    }

    function handleAuth(type) {
        const u = document.getElementById(type==='login'?'uL':'uR').value.trim();
        const p = document.getElementById(type==='login'?'pL':'pR').value.trim();
        if(type==='login') {
            db.ref('users/'+u).once('value', s => {
                if(s.exists() && s.val().password === p) {
                    localStorage.setItem("uSess", u); location.reload();
                } else alert("Error Login!");
            });
        } else {
            db.ref('users/'+u).set({password:p, saldo:0}).then(() => {
                localStorage.setItem("uSess", u); location.reload();
            });
        }
    }

    // --- WD SYSTEM ---
    function showWD() { document.getElementById('formWD').style.display = 'block'; }
    
    function processWD() {
        const amt = parseInt(document.getElementById('wdAmt').value);
        const bnk = document.getElementById('wdBank').value;
        const rek = document.getElementById('wdRek').value;

        db.ref('users/'+session+'/saldo').once('value', s => {
            const currentBal = s.val() || 0;
            if(amt > currentBal || amt < 10000) return alert("Saldo tidak cukup atau nominal terlalu kecil!");
            
            const wdData = { amount: amt, bank: bnk, rek: rek, status: "Pending", date: new Date().toLocaleString() };
            db.ref('users/'+session+'/wd_history').push(wdData);
            db.ref('users/'+session).update({ saldo: currentBal - amt });
            alert("Withdrawal diproses! Tunggu konfirmasi admin.");
            document.getElementById('formWD').style.display = 'none';
        });
    }

    function showWDHistory() {
        const modal = new bootstrap.Modal(document.getElementById('modalHistory'));
        db.ref('users/'+session+'/wd_history').once('value', s => {
            const list = document.getElementById('wdHistoryList');
            list.innerHTML = "";
            if(!s.exists()) { list.innerHTML = "<p class='text-center'>Belum ada riwayat.</p>"; }
            s.forEach(child => {
                const d = child.val();
                list.innerHTML += `<div class="p-2 border-bottom border-secondary mb-2">
                    <div class="d-flex justify-content-between"><b>Rp${d.amount.toLocaleString()}</b> <span class="badge bg-warning">${d.status}</span></div>
                    <small class="text-secondary">${d.date} - ${d.bank}</small>
                </div>`;
            });
            modal.show();
        });
    }

    // --- MINING ---
    function syncMine() {
        db.ref('users/'+session+'/contracts').on('value', s => {
            const list = document.getElementById('miningList');
            list.innerHTML = s.exists() ? "" : "<p class='text-center'>Belum ada kontrak.</p>";
            s.forEach(c => {
                const d = c.val();
                list.innerHTML += `<div class="ex-card text-center">
                    <h6>${d.name}</h6>
                    <div class="mining-orb" onclick="mineTap('${c.key}')"><div class="orb-inner">${d.clicks}/50</div></div>
                    <small>Misi: ${d.done}/3</small>
                </div>`;
            });
        });
    }

    function mineTap(cid) {
        db.ref('users/'+session+'/contracts/'+cid).once('value', s => {
            let d = s.val(); if(d.done >= 3) return alert("Limit!");
            let next = (d.clicks || 0) + 1;
            if(next >= 50) {
                db.ref('users/'+session+'/contracts/'+cid).update({clicks: 0, done: d.done+1});
                if(d.done+1 === 3) db.ref('users/'+session+'/saldo').transaction(v => v + d.daily);
            } else db.ref('users/'+session+'/contracts/'+cid).update({clicks: next});
        });
    }

    function buy(i) {
        const price = 10000*i;
        db.ref('users/'+session+'/saldo').once('value', s => {
            if(s.val() >= price) {
                db.ref('users/'+session).update({saldo: s.val() - price});
                db.ref('users/'+session+'/contracts/'+Date.now()).set({name:`INS_${i}`, daily:2000+(i*100), clicks:0, done:0});
                alert("Berhasil!");
            } else alert("Saldo Kurang!");
        });
    }

    function initChart() {
        const c = LightweightCharts.createChart(document.getElementById('chart'), { layout: { backgroundColor: 'transparent', textColor: '#888' }, grid: { vertLines: { color: '#222' }, horzLines: { color: '#222' } } });
        const l = c.addLineSeries({ color: '#ffec00' });
        let v = 100; setInterval(() => { v += (Math.random()-0.48)*3; l.update({ time: Date.now()/1000, value: v }); }, 2000);
    }

    function nav(id, el) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active-section'));
        document.getElementById(id).classList.add('active-section');
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
