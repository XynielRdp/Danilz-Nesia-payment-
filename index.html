<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IRANVEST V12.1 | Daniel Refined</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        :root { 
            --ex-yellow: #ffec00; --bg-deep: #0a0b0d; --card-bg: rgba(255, 255, 255, 0.05);
        }

        body { 
            background: var(--bg-deep); color: #fff; font-family: 'Inter', sans-serif; 
            margin: 0; overflow: hidden; height: 100vh;
        }

        /* CONTAINER FIX */
        #mainApp { display: none; height: 100vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        #authScreen { position: fixed; inset: 0; background: #000; z-index: 10000; display: none; align-items: center; justify-content: center; }

        /* CARDS */
        .glass-card { 
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; padding: 20px; margin-bottom: 15px; backdrop-filter: blur(10px);
        }

        /* MINING FIX */
        .mining-orb { 
            width: 130px; height: 130px; border-radius: 50%; margin: 15px auto;
            border: 2px solid var(--ex-yellow); display: flex; align-items: center; justify-content: center;
            cursor: pointer; position: relative; transition: transform 0.1s;
            background: radial-gradient(circle, rgba(255,236,0,0.1), transparent);
        }
        .mining-orb:active { transform: scale(0.9); }
        .orb-text { font-size: 20px; font-weight: 800; color: var(--ex-yellow); }

        /* CHAT UI PERFECTED */
        #supportPanel { 
            position: fixed; inset: 0; background: #0a0b0d; z-index: 10001; 
            display: none; flex-direction: column; 
        }
        .chat-header { padding: 15px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 15px; background: #111; }
        .chat-flow { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #080808; }
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 15px; font-size: 14px; line-height: 1.4; }
        .msg-admin { background: #222; color: #eee; align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg-user { background: var(--ex-yellow); color: #000; align-self: flex-end; border-bottom-right-radius: 2px; font-weight: 500; }
        .chat-input-area { padding: 10px 15px; background: #111; display: flex; gap: 10px; align-items: center; }

        /* NAVIGATION */
        .nav-bar { 
            position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9);
            display: flex; justify-content: space-around; padding: 12px 0;
            border-top: 1px solid #222; z-index: 999;
        }
        .nav-item { color: #555; text-align: center; font-size: 10px; cursor: pointer; text-decoration: none; }
        .nav-item.active { color: var(--ex-yellow); }

        section { display: none; padding: 20px 15px 100px; animation: fadeIn 0.3s ease; }
        .active-sec { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<audio id="djAudio" loop><source src="https://files.freemusicarchive.org/storage-freemusicarchive-org/music/no_curator/Ketsa/Raising_Frequency/Ketsa_-_08_-_Day_Trip.mp3" type="audio/mpeg"></audio>

<div id="authScreen">
    <div class="w-100 px-4" style="max-width: 400px;">
        <h1 class="text-center mb-5 fw-bold" style="color:var(--ex-yellow);">IRANVEST</h1>
        <div id="loginArea">
            <input type="text" id="uL" class="form-control bg-dark text-white border-0 mb-3 py-3" placeholder="Account ID">
            <input type="password" id="pL" class="form-control bg-dark text-white border-0 mb-4 py-3" placeholder="Password">
            <button class="btn btn-warning w-100 py-3 fw-bold" onclick="auth('login')">SIGN IN</button>
            <p class="text-center mt-4 small text-secondary" onclick="toggleF(true)">Register New Client</p>
        </div>
        <div id="regArea" style="display:none">
            <input type="text" id="uR" class="form-control bg-dark text-white border-0 mb-3 py-3" placeholder="New Account ID">
            <input type="password" id="pR" class="form-control bg-dark text-white border-0 mb-4 py-3" placeholder="Create Password">
            <button class="btn btn-warning w-100 py-3 fw-bold" onclick="auth('reg')">INITIALIZE NODE</button>
            <p class="text-center mt-4 small text-secondary" onclick="toggleF(false)">Back to Login</p>
        </div>
    </div>
</div>

<div id="mainApp">
    <div id="supportPanel">
        <div class="chat-header">
            <i class="fas fa-arrow-left" onclick="toggleSupport()"></i>
            <div>
                <div class="fw-bold">Daniel Support</div>
                <div class="text-success small" style="font-size: 10px;"><i class="fas fa-circle"></i> Online</div>
            </div>
        </div>
        <div class="chat-flow" id="chatFlow"></div>
        <div class="chat-input-area">
            <input type="text" id="chatIn" class="form-control bg-dark text-white border-0" placeholder="Type a message...">
            <button class="btn btn-warning" onclick="sendChat()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <section id="sec-home" class="active-sec">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="fw-bold m-0">Portfolio</h5>
            <i class="fas fa-headset text-warning fa-lg" onclick="toggleSupport()"></i>
        </div>
        <div class="glass-card text-center py-4">
            <small class="text-secondary">Equity Balance</small>
            <h1 class="fw-bold" id="balTxt">Rp 0</h1>
        </div>
        <div id="chart" class="glass-card p-0" style="height:180px;"></div>
        <h6 class="mb-3">Live Instruments</h6>
        <div id="stocks" class="row g-2"></div>
    </section>

    <section id="sec-mine">
        <h5 class="fw-bold mb-4">Mining Station</h5>
        <div id="mineList"></div>
    </section>

    <section id="sec-wallet">
        <h5 class="fw-bold mb-4">Financials</h5>
        <div class="glass-card d-flex justify-content-between" onclick="showForm('depo')">
            <span><i class="fas fa-plus-circle text-success me-2"></i> Deposit</span>
            <i class="fas fa-chevron-right text-secondary"></i>
        </div>
        <div class="glass-card d-flex justify-content-between" onclick="showForm('wd')">
            <span><i class="fas fa-minus-circle text-danger me-2"></i> Withdraw</span>
            <i class="fas fa-chevron-right text-secondary"></i>
        </div>
        <div id="formArea" class="glass-card mt-3" style="display:none">
            <h6 id="formTitle" class="fw-bold text-warning mb-3"></h6>
            <input type="number" id="fAmt" class="form-control bg-dark text-white border-0 mb-3" placeholder="Nominal Rp">
            <button class="btn btn-warning w-100 fw-bold" id="formBtn"></button>
        </div>
    </section>

    <div class="nav-bar">
        <div class="nav-item active" onclick="nav('sec-home', this)"><i class="fas fa-chart-line fa-lg"></i><br>Trade</div>
        <div class="nav-item" onclick="nav('sec-mine', this)"><i class="fas fa-microchip fa-lg"></i><br>Mine</div>
        <div class="nav-item" onclick="nav('sec-wallet', this)"><i class="fas fa-wallet fa-lg"></i><br>Wallet</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCwrvbPBNwB0r7PSdFBqa4wS2gag-MmpDE",
        authDomain: "my-invest-database.firebaseapp.com",
        databaseURL: "https://my-invest-database-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "my-invest-database",
        storageBucket: "my-invest-database.firebasestorage.app",
        messagingSenderId: "397898231978",
        appId: "1:397898231978:web:ecf7ff6b9682f5e0b660d3"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let user = localStorage.getItem("uSess");

    window.onload = () => {
        if(user) db.ref('users/'+user).once('value', s => s.exists() ? start() : logout());
        else document.getElementById('authScreen').style.display = 'flex';
    };

    function start() {
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        db.ref('users/'+user+'/saldo').on('value', s => document.getElementById('balTxt').innerText = "Rp " + (s.val() || 0).toLocaleString());
        
        let h = "";
        for(let i=1; i<=60; i++) h += `<div class="col-6"><div class="glass-card p-3 text-center" onclick="buy(${i})"><small class="text-secondary d-block">EX_${i}</small><div class="fw-bold">Rp${(10000*i).toLocaleString()}</div></div></div>`;
        document.getElementById('stocks').innerHTML = h;
        
        initChart(); syncMine(); loadSupport();
        document.body.addEventListener('click', () => document.getElementById('djAudio').play(), {once:true});
    }

    // --- MINING MISSION FIX ---
    function syncMine() {
        db.ref('users/'+user+'/contracts').on('value', s => {
            const l = document.getElementById('mineList');
            l.innerHTML = s.exists() ? "" : "<p class='text-center py-5'>Beli node untuk mulai mining.</p>";
            s.forEach(c => {
                const d = c.val();
                l.innerHTML += `
                    <div class="glass-card text-center">
                        <h6 class="fw-bold">${d.name}</h6>
                        <div class="mining-orb" onclick="tap('${c.key}')">
                            <div class="orb-text">${d.clicks}/50</div>
                        </div>
                        <div class="progress bg-dark mb-2" style="height:6px">
                            <div class="progress-bar bg-warning" style="width:${(d.clicks/50)*100}%"></div>
                        </div>
                        <small class="text-secondary">Mission: ${d.done}/3</small>
                    </div>`;
            });
        });
    }

    function tap(id) {
        const ref = db.ref('users/'+user+'/contracts/'+id);
        ref.once('value', s => {
            let d = s.val(); 
            if(d.done >= 3) return alert("Daily Limit!");
            let next = (d.clicks || 0) + 1;
            if(next >= 50) {
                ref.update({ clicks: 0, done: d.done + 1 }).then(() => {
                    if(d.done + 1 === 3) db.ref('users/'+user+'/saldo').transaction(v => (v || 0) + d.daily);
                });
            } else {
                ref.update({ clicks: next });
            }
        });
    }

    // --- SUPPORT UI REFINED ---
    function toggleSupport() {
        const p = document.getElementById('supportPanel');
        p.style.display = (p.style.display === 'flex') ? 'none' : 'flex';
    }

    function loadSupport() {
        db.ref('messages/'+user).on('value', s => {
            const flow = document.getElementById('chatFlow');
            flow.innerHTML = '<div class="msg msg-admin">Halo! Ada yang bisa kami bantu mengenai deposit atau withdraw?</div>';
            s.forEach(m => {
                const d = m.val();
                flow.innerHTML += `<div class="msg ${d.sender==='admin'?'msg-admin':'msg-user'}">${d.text}</div>`;
            });
            flow.scrollTop = flow.scrollHeight;
        });
    }

    function sendChat() {
        const i = document.getElementById('chatIn');
        if(!i.value) return;
        db.ref('messages/'+user).push({ sender: 'user', text: i.value, time: Date.now() });
        i.value = "";
    }

    // --- SYSTEM LOGIC ---
    function showForm(t) {
        document.getElementById('formArea').style.display = 'block';
        document.getElementById('formTitle').innerText = t === 'depo' ? "Deposit Funds" : "Withdraw Funds";
        document.getElementById('formBtn').innerText = t === 'depo' ? "Confirm Deposit" : "Request WD";
        document.getElementById('formBtn').onclick = () => {
            const amt = document.getElementById('fAmt').value;
            if(!amt) return;
            if(t === 'depo') {
                db.ref('messages/'+user).push({ sender: 'user', text: `[SYSTEM] Deposit Request: Rp${amt}. DANA: 085714438874` });
                alert("Request sent to support!");
            } else {
                db.ref('users/'+user+'/saldo').once('value', s => {
                    if(s.val() < amt) return alert("Low balance!");
                    db.ref('users/'+user).update({ saldo: s.val() - amt });
                    db.ref('users/'+user+'/wd_history').push({ amount: amt, date: new Date().toLocaleString() });
                    alert("WD Request sent!");
                });
            }
            document.getElementById('formArea').style.display = 'none';
        };
    }

    function buy(i) {
        const p = 10000*i;
        db.ref('users/'+user+'/saldo').once('value', s => {
            if((s.val() || 0) >= p) {
                db.ref('users/'+user).update({ saldo: s.val() - p });
                db.ref('users/'+user+'/contracts/'+Date.now()).set({ name: 'NODE_'+i, daily: 2000+(i*100), clicks: 0, done: 0 });
                alert("Active!");
            } else alert("Balance low!");
        });
    }

    function auth(t) {
        const u = document.getElementById(t==='login'?'uL':'uR').value.trim();
        const p = document.getElementById(t==='login'?'pL':'pR').value.trim();
        if(t==='login') db.ref('users/'+u).once('value', s => {
            if(s.exists() && s.val().password === p) { localStorage.setItem("uSess", u); location.reload(); }
            else alert("Fail!");
        });
        else db.ref('users/'+u).set({ password: p, saldo: 0 }).then(() => { localStorage.setItem("uSess", u); location.reload(); });
    }

    function initChart() {
        const c = LightweightCharts.createChart(document.getElementById('chart'), { layout: { backgroundColor: 'transparent', textColor: '#444' }, grid: { vertLines: { color: '#111' }, horzLines: { color: '#111' } } });
        const l = c.addLineSeries({ color: '#ffec00', lineWidth: 2 });
        let v = 100; setInterval(() => { v += (Math.random()-0.48)*3; l.update({ time: Date.now()/1000, value: v }); }, 2000);
    }

    function nav(id, el) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active-sec'));
        document.getElementById(id).classList.add('active-sec');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    function toggleF(r) { document.getElementById('loginArea').style.display = r?'none':'block'; document.getElementById('regArea').style.display = r?'block':'none'; }
    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
