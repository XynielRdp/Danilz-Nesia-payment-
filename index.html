<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT DANIEL TECHNOLOGY</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg: #030d16; --card: rgba(255,255,255,0.05); --gold: #ffcc00; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        .glass-card { 
            background: var(--card); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 20px; 
            padding: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .btn-action { background: var(--card); border: 1px solid var(--gold); color: white; transition: 0.3s; }
        .btn-action:hover { background: var(--gold); color: black; }
        
        .status-badge { font-size: 0.7rem; padding: 3px 8px; border-radius: 5px; }
        .pending { background: #664d03; color: #ffecb5; }
        
        #authSection, #mainDashboard { display: none; }
    </style>
</head>
<body>

<div id="authSection" class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="glass-card w-100" style="max-width: 400px;">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-warning">IRANVEST</h3>
            <p class="text-secondary small">Quantum Investment Network</p>
        </div>
        <input type="text" id="username" class="form-control mb-3 bg-dark text-white border-secondary" placeholder="Username">
        <input type="password" id="password" class="form-control mb-3 bg-dark text-white border-secondary" placeholder="Password">
        <button class="btn btn-warning w-100 fw-bold mb-3" onclick="handleLogin()">LOGIN</button>
        <p class="text-center small">Belum punya akun? <a href="#" class="text-warning" onclick="handleRegister()">Daftar Disini</a></p>
    </div>
</div>

<div id="mainDashboard" class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="fw-bold text-warning">DANIEL TECHNOLOGY</h5>
        <button class="btn btn-sm btn-danger" onclick="logout()">Keluar</button>
    </div>

    <div class="glass-card text-center mb-4">
        <p class="text-secondary small mb-1" id="welcomeUser">Halo, Investor</p>
        <h1 id="uSaldo" class="fw-bold">Rp 0</h1>
        <div class="row mt-4">
            <div class="col-6">
                <button class="btn btn-action w-100" data-bs-toggle="modal" data-bs-target="#mDepo">
                    <i class="fas fa-plus-circle me-2"></i>Isi Saldo
                </button>
            </div>
            <div class="col-6">
                <button class="btn btn-action w-100" data-bs-toggle="modal" data-bs-target="#mWD">
                    <i class="fas fa-paper-plane me-2"></i>Tarik Dana
                </button>
            </div>
        </div>
    </div>

    <h6 class="fw-bold mb-3 ms-2">RIWAYAT TRANSAKSI</h6>
    <div id="historyList">
        </div>
</div>

<div class="modal fade" id="mDepo" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark border-secondary">
            <div class="modal-body text-center p-4">
                <h5 class="text-warning fw-bold mb-3">Deposit Dana</h5>
                <div class="p-3 bg-secondary bg-opacity-25 rounded-3 mb-3">
                    <small class="text-secondary">Transfer Ke DANA:</small><br>
                    <strong class="fs-5">0857-1443-8874</strong>
                </div>
                <input type="number" id="amtDep" class="form-control mb-3 bg-dark text-white border-secondary" placeholder="Nominal Rp">
                <button class="btn btn-warning w-100 fw-bold" onclick="reqDep()">KONFIRMASI SUDAH BAYAR</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // Konfigurasi Database Singapore Daniel
    const firebaseConfig = {
        apiKey: "AIzaSyCwrvbPBNwB0r7PSdFBqa4wS2gag-MmpDE",
        authDomain: "my-invest-database.firebaseapp.com",
        databaseURL: "https://my-invest-database-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "my-invest-database",
        storageBucket: "my-invest-database.firebasestorage.app",
        messagingSenderId: "397898231978",
        appId: "1:397898231978:web:ecf7ff6b9682f5e0b660d3"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let session = localStorage.getItem("uSess");

    // Fungsi Login
    function handleLogin() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        db.ref('users/' + u).once('value', s => {
            const d = s.val();
            if(d && d.password === p) {
                localStorage.setItem("uSess", u);
                location.reload();
            } else { alert("Login Gagal!"); }
        });
    }

    // Fungsi Register (Pakai Prompt agar simpel)
    function handleRegister() {
        const u = prompt("Username Baru:");
        const p = prompt("Password Baru:");
        if(u && p) {
            db.ref('users/' + u).set({ username: u, password: p, saldo: 0 })
            .then(() => alert("Berhasil! Silakan Login."));
        }
    }

    // Fungsi Kirim Deposit ke Database
    function reqDep() {
        const amount = document.getElementById('amtDep').value;
        if(amount < 1000) return alert("Minimal Rp 1.000");
        
        db.ref('transactions/' + session + '/DEP' + Date.now()).set({
            type: "DEPOSIT",
            amount: amount,
            status: "PENDING",
            date: new Date().toLocaleDateString()
        }).then(() => {
            alert("Laporan terkirim! Admin akan mengecek saldo Anda.");
            location.reload();
        });
    }

    // Logika Tampilan (Jika sudah login)
    if(session) {
        document.getElementById('authSection').style.display = 'none';
        document.getElementById('mainDashboard').style.display = 'block';
        document.getElementById('welcomeUser').innerText = "Halo, " + session;

        // Ambil Saldo Real-time
        db.ref('users/' + session + '/saldo').on('value', s => {
            document.getElementById('uSaldo').innerText = "Rp " + (s.val() || 0).toLocaleString();
        });

        // Ambil Riwayat
        db.ref('transactions/' + session).on('value', s => {
            const list = document.getElementById('historyList');
            list.innerHTML = "";
            s.forEach(item => {
                const v = item.val();
                list.innerHTML += `
                    <div class="glass-card p-3 mb-2 d-flex justify-content-between align-items-center">
                        <div>
                            <small class="text-secondary">${v.date}</small><br>
                            <strong>${v.type}</strong>
                        </div>
                        <div class="text-end">
                            <span class="fw-bold">Rp ${parseInt(v.amount).toLocaleString()}</span><br>
                            <span class="status-badge pending">${v.status}</span>
                        </div>
                    </div>`;
            });
        });
    } else {
        document.getElementById('authSection').style.display = 'flex';
    }

    function logout() { localStorage.removeItem("uSess"); location.reload(); }
</script>
</body>
</html>
