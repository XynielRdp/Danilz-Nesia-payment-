<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IRANVEST TITAN V9.1 PRO | Daniel Tech</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');

        :root { 
            --neon-blue: #00f3ff; --neon-pink: #ff00ff; --neon-yellow: #ffcc00;
            --dark-bg: #050505; --card-bg: rgba(10, 10, 10, 0.95);
        }

        body { 
            background: var(--dark-bg); color: #e0e0e0; font-family: 'Rajdhani', sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden;
            background-image: linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* PERBAIKAN: Default display diset NONE agar tidak tumpang tindih saat loading */
        #authPage { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh; 
            display: none; align-items: center; justify-content: center; 
            background: #000; z-index: 99999; 
        }
        
        #mainApp { display: none; }

        .glass { background: var(--card-bg); border: 1px solid var(--neon-blue); backdrop-filter: blur(15px); box-shadow: 0 0 20px rgba(0, 243, 255, 0.15); border-radius: 12px; }
        .btn-cyber { background: linear-gradient(45deg, var(--neon-blue), #005f66); border: none; color: black; font-family: 'Orbitron'; font-weight: bold; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); transition: 0.3s; }
        
        .mining-node { width: 100px; height: 100px; border: 4px solid var(--neon-blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 20px auto; cursor: pointer; transition: 0.2s; position: relative; }
        .mining-node::after { content: ''; position: absolute; width: 120%; height: 120%; border: 2px dashed var(--neon-pink); border-radius: 50%; animation: spin 4s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #chatBox { position: fixed; bottom: 85px; right: 15px; width: 300px; height: 400px; display: none; flex-direction: column; z-index: 10000; border: 2px solid var(--neon-pink); }
        #chatMsg { flex: 1; overflow-y: auto; padding: 10px; background: #000; }
        .msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 8px; font-size: 13px; max-width: 80%; }
        .msg-admin { background: #1a1a1a; color: var(--neon-blue); border-left: 3px solid var(--neon-blue); }
        .msg-user { background: var(--neon-blue); color: black; align-self: flex-end; margin-left: auto; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid var(--neon-blue); z-index: 9998; }
        .nav-item { color: #444; font-size: 10px; text-align: center; cursor: pointer; }
        .nav-item.active { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }

        section { display: none; padding: 20px 15px 120px; }
        .active-sec { display: block !important; }
    </style>
</head>
<body>

<audio id="bgMusic" loop>
    <source src="https://files.freemusicarchive.org/storage-freemusicarchive-org/music/no_curator/Ketsa/Raising_Frequency/Ketsa_-_08_-_Day_Trip.mp3" type="audio/mpeg">
</audio>

<div id="chatBox" class="glass">
    <div class="p-2 border-bottom border-info d-flex justify-content-between align-items-center">
        <span class="text-info fw-bold">DANIEL_SUPPORT</span>
        <i class="fas fa-times" onclick="toggleChat()"></i>
    </div>
    <div id="chatMsg" class="d-flex flex-column"></div>
    <div class="p-2 bg-dark d-flex gap-1">
        <label class="btn btn-dark btn-sm m-0"><i class="fas fa-image"></i><input type="file" hidden onchange="sendImg()"></label>
        <input type="text" id="chatInp" class="form-control form-control-sm bg-black text-white" placeholder="Pesan...">
        <button class="btn btn-info btn-sm" onclick="sendChat()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<div id="authPage">
    <div class="glass p-4 w-100" style="max-width:360px;">
        <h2 class="text-center text-info fw-bold mb-4">IRANVEST</h2>
        <div id="loginArea">
            <input type="text" id="uL" class="form-control mb-3 bg-dark text-white border-info" placeholder="ID_USER">
            <input type="password" id="pL" class="form-control mb-4 bg-dark text-white border-info" placeholder="PASSWORD">
            <button class="btn btn-cyber w-100 py-3" onclick="doLogin()">AUTHORIZE</button>
            <p class="text-center mt-3 small">Baru? <span class="text-info pointer" onclick="toggleAuth(true)" style="cursor:pointer">Daftar Akun</span></p>
        </div>
        <div id="regArea" style="display:none;">
            <input type="text" id="uR" class="form-control mb-3 bg-dark text-white border-info" placeholder="NEW_ID">
            <input type="password" id="pR" class="form-control mb-4 bg-dark text-white border-info" placeholder="NEW_PASSWORD">
            <button class="btn btn-cyber w-100 py-3" onclick="doReg()">INITIALIZE</button>
            <p class="text-center mt-3 small"><span class="text-info pointer" onclick="toggleAuth(false)" style="cursor:pointer">Kembali Login</span></p>
        </div>
    </div>
</div>

<div id="mainApp">
    <section id="sec-home" class="active-sec">
        <div class="d-flex justify-content-between mb-3">
            <h5 class="text-info">MARKET_MINING</h5>
            <h5 class="text-warning" id="bal">Rp 0</h5>
        </div>
        <div id="chart" class="glass mb-4" style="height:200px;"></div>
        <div class="stock-grid row g-2" id="stocks"></div>
    </section>

    <section id="sec-mission">
        <h5 class="text-info mb-4">MINING_STATION</h5>
        <div id="missionList"></div>
    </section>

    <section id="sec-wallet">
        <h5 class="text-info mb-4">WALLET_DEPT</h5>
        <div class="glass p-3 mb-4 text-center">
            <p class="text-info small">Transfer DANA: 085714438874</p>
            <button class="btn btn-cyber w-100 mb-2" onclick="toggleChat()">KONFIRMASI VIA CHAT</button>
        </div>
    </section>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="nav('sec-home', this)"><i class="fas fa-microchip fa-lg"></i><br>HOME</div>
        <div class="nav-item" onclick="nav('sec-mission', this)"><i class="fas fa-hammer fa-lg"></i><br>MINING</div>
        <div class="nav-item" onclick="nav('sec-wallet', this)"><i class="fas fa-wallet fa-lg"></i><br>WALLET</div>
        <div class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt fa-lg"></i><br>EXIT</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCwrvbPBNwB0r7PSdFBqa4wS2gag-MmpDE",
        authDomain: "my-invest-database.firebaseapp.com",
        databaseURL: "https://my-invest-database-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "my-invest-database",
        storageBucket: "my-invest-database.firebasestorage.app",
        messagingSenderId: "397898231978",
        appId: "1:397898231978:web:ecf7ff6b9682f5e0b660d3"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // -- PERBAIKAN LOGIKA STARTUP --
    window.onload = () => {
        const session = localStorage.getItem("uSess");
        if (session && session !== "undefined") {
            db.ref('users/' + session).once('value', s => {
                if(s.exists()) {
                    launchMainApp(session);
                } else {
                    localStorage.clear();
                    launchAuth();
                }
            });
        } else {
            launchAuth();
        }
    };

    function launchAuth() {
        document.getElementById('mainApp').style.display = 'none';
        document.getElementById('authPage').style.display = 'flex';
    }

    function launchMainApp(user) {
        document.getElementById('authPage').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        init(user);
    }

    // -- AUTH ACTIONS --
    function doLogin() {
        const u = document.getElementById('uL').value.trim();
        const p = document.getElementById('pL').value.trim();
        if(!u || !p) return;
        db.ref('users/'+u).once('value', s => {
            if(s.exists() && s.val().password === p) {
                localStorage.setItem("uSess", u);
                location.reload();
            } else alert("INVALID ACCESS");
        });
    }

    function doReg() {
        const u = document.getElementById('uR').value.trim();
        const p = document.getElementById('pR').value.trim();
        if(!u || !p) return;
        db.ref('users/'+u).set({password:p, saldo:0}).then(() => {
            localStorage.setItem("uSess", u);
            location.reload();
        });
    }

    function toggleAuth(r) {
        document.getElementById('loginArea').style.display = r?'none':'block';
        document.getElementById('regArea').style.display = r?'block':'none';
    }

    // -- MAIN LOGIC --
    function init(session) {
        // Sync Saldo
        db.ref('users/'+session+'/saldo').on('value', s => {
            document.getElementById('bal').innerText = "Rp " + (s.val() || 0).toLocaleString();
        });
        
        // Stock List
        let sc = "";
        for(let i=1; i<=60; i++) {
            sc += `<div class="col-6"><div class="glass p-2 text-center" onclick="buy(${i})">
                <img src="https://picsum.photos/seed/${i}/100/60" class="w-100 rounded mb-1">
                <div class="small fw-bold">NODE_V${i}</div>
                <div class="text-info small">Rp ${ (10000 * i).toLocaleString() }</div>
            </div></div>`;
        }
        document.getElementById('stocks').innerHTML = sc;

        // Init Chart & Missions
        initChart();
        renderMissions(session);
        
        // Music Trigger
        document.body.addEventListener('click', () => { document.getElementById('bgMusic').play(); }, {once:true});
    }

    function renderMissions(session) {
        db.ref('users/'+session+'/contracts').on('value', s => {
            const list = document.getElementById('missionList');
            if(!s.exists()) return list.innerHTML = "<p class='text-center'>Beli Stock untuk mulai Mining.</p>";
            list.innerHTML = "";
            s.forEach(c => {
                const d = c.val();
                list.innerHTML += `
                    <div class="glass p-3 mb-3 text-center">
                        <h6>${d.name}</h6>
                        <div class="mining-node" onclick="mine('${c.key}')">
                            <i class="fas fa-hammer fa-2x text-info"></i>
                        </div>
                        <p class="small">Clicks: ${d.clicks || 0}/50 | Hari ini: ${d.missions_done || 0}/3</p>
                    </div>
                `;
            });
        });
    }

    function mine(cid) {
        const session = localStorage.getItem("uSess");
        db.ref('users/'+session+'/contracts/'+cid).once('value', s => {
            let d = s.val();
            if(d.missions_done >= 3) return alert("Limit!");
            let next = (d.clicks || 0) + 1;
            if(next >= 50) {
                db.ref('users/'+session+'/contracts/'+cid).update({clicks:0, missions_done: (d.missions_done+1)});
                if(d.missions_done + 1 === 3) {
                    db.ref('users/'+session+'/saldo').transaction(v => v + d.daily);
                }
            } else {
                db.ref('users/'+session+'/contracts/'+cid).update({clicks: next});
            }
        });
    }

    function initChart() {
        const c = LightweightCharts.createChart(document.getElementById('chart'), {
            layout: { backgroundColor: 'transparent', textColor: '#00f3ff' },
            grid: { vertLines: { color: '#111' }, horzLines: { color: '#111' } },
        });
        const l = c.addLineSeries({ color: '#00f3ff' });
        let b = 100;
        setInterval(() => { b += (Math.random()-0.48)*5; l.update({ time: Date.now()/1000, value: b }); }, 2000);
    }

    function nav(id, el) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active-sec'));
        document.getElementById(id).classList.add('active-sec');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    function toggleChat() {
        const c = document.getElementById('chatBox');
        c.style.display = c.style.display === 'flex' ? 'none' : 'flex';
    }

    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
