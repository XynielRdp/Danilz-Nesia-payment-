<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAHARAJA | JASTEB BIASA FIX</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');

        :root {
            --primary: #0ea5e9;
            --secondary: #1e293b;
            --bg-dark: #0f172a;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh; padding-bottom: 120px;
            overflow-x: hidden;
        }

        #authScreen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        #mainApp { display: none; }

        .card-pro {
            background: var(--secondary); border-radius: 20px;
            padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05);
        }

        .balance-card {
            background: linear-gradient(135deg, #0ea5e9, #6366f1);
            border-radius: 20px; padding: 20px; margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .form-control-pro {
            background: rgba(15, 23, 42, 0.8) !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            color: white !important; padding: 12px !important; border-radius: 12px !important;
        }

        .price-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .price-item {
            background: rgba(15, 23, 42, 0.5); border: 2px solid transparent;
            border-radius: 15px; padding: 15px; cursor: pointer; text-align: center;
            transition: 0.2s;
        }
        .price-item.active { border-color: var(--primary); background: rgba(14, 165, 233, 0.15); transform: scale(0.98); }

        /* TABLE HISTORY FIX */
        .history-container { max-height: 250px; overflow-y: auto; }
        .table-history { font-size: 11px; width: 100%; color: #e2e8f0; }
        .table-history th { color: var(--primary); text-transform: uppercase; letter-spacing: 1px; padding: 10px 5px; border-bottom: 1px solid #334155; }
        .table-history td { padding: 12px 5px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(10px);
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000;
        }

        .btn-pay {
            background: var(--primary); border: none; padding: 12px 25px;
            border-radius: 12px; font-weight: 800; color: white;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.4);
        }

        .badge-status { padding: 4px 8px; border-radius: 6px; font-size: 9px; font-weight: 700; }
    </style>
</head>
<body>

<div id="authScreen">
    <div class="card-pro w-100" style="max-width: 380px;">
        <h3 class="fw-800 text-info text-center mb-2">MAHARAJA</h3>
        <p class="text-center text-muted small mb-4">JASTEB BIASA PREMIUM</p>
        
        <div id="loginBox">
            <input type="text" id="uL" class="form-control-pro w-100 mb-2" placeholder="Username">
            <input type="password" id="pL" class="form-control-pro w-100 mb-3" placeholder="Password">
            <button class="btn btn-primary w-100 p-3 fw-bold rounded-3" onclick="auth('login')">MASUK SEKARANG</button>
            <p class="text-center mt-3 small">Belum ada akun? <a href="#" onclick="toggleAuth(true)" class="text-info text-decoration-none">Daftar</a></p>
        </div>

        <div id="regBox" style="display:none">
            <input type="text" id="uR" class="form-control-pro w-100 mb-2" placeholder="Pilih Username">
            <input type="password" id="pR" class="form-control-pro w-100 mb-3" placeholder="Pilih Password">
            <button class="btn btn-info w-100 p-3 fw-bold rounded-3 text-white" onclick="auth('reg')">DAFTAR AKUN</button>
            <p class="text-center mt-3 small">Sudah punya akun? <a href="#" onclick="toggleAuth(false)" class="text-info text-decoration-none">Login</a></p>
        </div>
    </div>
</div>

<div id="mainApp">
    <nav class="navbar navbar-dark px-3 py-2 border-bottom border-secondary mb-3 sticky-top bg-dark">
        <span class="navbar-brand fw-800 text-info">MAHARAJA</span>
        <button class="btn btn-link text-danger p-0" onclick="logout()"><i class="fas fa-sign-out-alt fa-lg"></i></button>
    </nav>

    <div class="container px-3">
        <div class="balance-card">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <small class="opacity-75">Saldo Maharaja</small>
                    <h2 class="fw-800 mb-0">Rp <span id="valBalance">0</span></h2>
                </div>
                <i class="fas fa-wallet fa-2x opacity-50"></i>
            </div>
            <button class="btn btn-sm btn-white bg-white text-dark mt-3 fw-bold rounded-pill px-3" onclick="alert('Topup ke Admin: 085714438874')">+ ISI SALDO</button>
        </div>

        <div class="card-pro">
            <h6 class="fw-bold mb-3 small"><i class="fas fa-envelope-open text-info me-2"></i>EMAIL TARGET</h6>
            <input type="email" id="targetEmail" class="form-control-pro w-100" placeholder="user@example.com">
        </div>

        <div class="card-pro">
            <h6 class="fw-bold mb-3 small"><i class="fas fa-th-large text-info me-2"></i>PILIH NOMINAL</h6>
            <div class="price-grid">
                <div class="price-item" onclick="selectItem('Jasteb 1K', 1000, this)">
                    <b class="d-block">1K</b><small class="text-info">Rp 1.000</small>
                </div>
                <div class="price-item" onclick="selectItem('Jasteb 5K', 5000, this)">
                    <b class="d-block">5K</b><small class="text-info">Rp 5.000</small>
                </div>
                <div class="price-item" onclick="selectItem('Jasteb 10K', 10000, this)">
                    <b class="d-block">10K</b><small class="text-info">Rp 10.000</small>
                </div>
                <div class="price-item" onclick="selectItem('Jasteb 25K', 25000, this)">
                    <b class="d-block">25K</b><small class="text-info">Rp 25.000</small>
                </div>
                <div class="price-item" onclick="selectItem('Jasteb 50K', 50000, this)">
                    <b class="d-block">50K</b><small class="text-info">Rp 50.000</small>
                </div>
                <div class="price-item" onclick="selectItem('Jasteb 100K', 100000, this)">
                    <b class="d-block">100K</b><small class="text-info">Rp 100.000</small>
                </div>
            </div>
        </div>

        <div class="card-pro">
            <h6 class="fw-bold mb-3 small"><i class="fas fa-history text-info me-2"></i>RIWAYAT ANDA</h6>
            <div class="history-container">
                <table class="table-history">
                    <thead>
                        <tr><th>Produk</th><th>Email</th><th>Status</th></tr>
                    </thead>
                    <tbody id="historyBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div>
            <small class="text-muted d-block" style="font-size: 9px;">Total Bayar</small>
            <b id="totalTxt" class="text-info">Rp 0</b>
        </div>
        <button class="btn-pay" onclick="prosesBayar()">BAYAR SEKARANG</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // Konfigurasi Firebase Daniel
    const firebaseConfig = {
        apiKey: "AIzaSyCwrvbPBNwB0r7PSdFBqa4wS2gag-MmpDE",
        authDomain: "my-invest-database.firebaseapp.com",
        databaseURL: "https://my-invest-database-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "my-invest-database",
        storageBucket: "my-invest-database.firebasestorage.app",
        messagingSenderId: "397898231978",
        appId: "1:397898231978:web:ecf7ff6b9682f5e0b660d3"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let curUser = localStorage.getItem("mhrj_user");
    let sPrice = 0; let sName = ""; let curBalance = 0;

    // Cek Login Saat Refresh
    window.onload = () => { if(curUser) startApp(curUser); };

    function toggleAuth(reg) {
        document.getElementById('loginBox').style.display = reg ? 'none' : 'block';
        document.getElementById('regBox').style.display = reg ? 'block' : 'none';
    }

    function auth(type) {
        const u = document.getElementById(type==='login'?'uL':'uR').value.trim().toLowerCase();
        const p = document.getElementById(type==='login'?'pL':'pR').value.trim();
        if(!u || !p) return alert("Harap isi semua kolom!");

        if(type==='login') {
            db.ref('users/'+u).once('value').then(s => {
                if(s.exists() && s.val().pass === p) {
                    localStorage.setItem("mhrj_user", u);
                    startApp(u);
                } else { alert("Username atau Password salah!"); }
            });
        } else {
            db.ref('users/'+u).once('value').then(s => {
                if(s.exists()) return alert("Username sudah terdaftar!");
                db.ref('users/'+u).set({pass:p, balance: 0}).then(() => {
                    alert("Daftar Berhasil! Silakan Login."); toggleAuth(false);
                });
            });
        }
    }

    function startApp(u) {
        curUser = u;
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        
        // Sync Saldo Realtime
        db.ref('users/'+u+'/balance').on('value', s => {
            curBalance = s.val() || 0;
            document.getElementById('valBalance').innerText = curBalance.toLocaleString('id-ID');
        });

        // Sync History Khusus User Ini
        db.ref('orders').orderByChild('user').equalTo(u).on('value', s => {
            const body = document.getElementById('historyBody');
            body.innerHTML = "";
            if(!s.exists()) {
                body.innerHTML = "<tr><td colspan='3' class='text-center py-4 text-muted'>Belum ada transaksi</td></tr>";
                return;
            }
            s.forEach(d => {
                const v = d.val();
                let statusColor = v.status === 'Selesai' ? 'bg-success' : 'bg-warning text-dark';
                body.innerHTML = `
                <tr>
                    <td><b>${v.item}</b></td>
                    <td>${v.email}</td>
                    <td><span class="badge-status ${statusColor}">${v.status}</span></td>
                </tr>` + body.innerHTML;
            });
        });
    }

    function selectItem(n, p, el) {
        document.querySelectorAll('.price-item').forEach(x => x.classList.remove('active'));
        el.classList.add('active');
        sPrice = p; sName = n;
        document.getElementById('totalTxt').innerText = "Rp " + p.toLocaleString('id-ID');
    }

    function prosesBayar() {
        const mail = document.getElementById('targetEmail').value.trim();
        if(!mail || !sPrice) return alert("Pilih layanan dan masukkan email target!");
        if(curBalance < sPrice) return alert("Saldo Anda tidak cukup! Hubungi Admin.");

        if(confirm(`Konfirmasi pembayaran ${sName} senilai Rp ${sPrice.toLocaleString('id-ID')}?`)) {
            const newBal = curBalance - sPrice;
            // Update Saldo & Tambah Order (Atomic Update)
            db.ref('users/'+curUser).update({ balance: newBal }).then(() => {
                db.ref('orders').push({
                    user: curUser,
                    email: mail,
                    item: sName,
                    harga: sPrice,
                    status: "Proses",
                    time: Date.now()
                });
                alert("Pembayaran Berhasil! Pesanan sedang diproses admin.");
            }).catch(err => alert("Error: " + err));
        }
    }

    function logout() { localStorage.removeItem("mhrj_user"); location.reload(); }
</script>
</body>
</html>
