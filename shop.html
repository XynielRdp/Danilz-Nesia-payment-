<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - DANILZ NESIA</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#05070a] text-white p-6">
    <div class="max-w-md mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-xl font-bold text-[#FFD700]">DANILZ NESIA</h2>
            <button onclick="logout()" class="text-xs text-red-500">Keluar</button>
        </div>

        <div class="bg-white/5 p-6 rounded-3xl border border-white/10 mb-6">
            <p class="text-[10px] text-gray-500 uppercase tracking-widest font-bold">Saldo Kamu</p>
            <h3 id="user-balance" class="text-3xl font-black mt-1 text-white">Rp 0</h3>
            <button onclick="window.location.href='finance.html'" class="mt-4 bg-yellow-500 text-black text-[10px] font-black px-4 py-2 rounded-lg">TOP UP SALDO</button>
        </div>

        <h4 class="text-sm font-bold mb-4 uppercase text-gray-400">Layanan Top Up</h4>
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white/5 p-4 rounded-2xl border border-white/10 text-center">
                <p class="text-xs font-bold">Mobile Legends</p>
                <p class="text-[9px] text-yellow-500 mt-1 italic">Tersedia</p>
            </div>
            <div class="bg-white/5 p-4 rounded-2xl border border-white/10 text-center opacity-50">
                <p class="text-xs font-bold">Free Fire</p>
                <p class="text-[9px] text-gray-500 mt-1 italic">Segera</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBY7FaSViddpNqnncQ8Vtfp4Jmt7pJ6a80",
            authDomain: "danilz-nesia.firebaseapp.com",
            projectId: "danilz-nesia",
            appId: "1:796392081651:web:a36a4545ddf92d97910f86"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, "users", user.uid));
                if (snap.exists()) {
                    document.getElementById('user-balance').innerText = "Rp " + snap.data().balance.toLocaleString('id-ID');
                }
            } else { window.location.href = "login.html"; }
        });

        window.logout = () => signOut(auth).then(() => window.location.href = "login.html");
    </script>
</body>
</html>
