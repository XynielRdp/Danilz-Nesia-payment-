<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DANILZ NESIA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #05070a; color: #fff; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-gold { background: linear-gradient(135deg, #FFD700 0%, #B8860B 100%); color: #000; font-weight: bold; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="max-w-md w-full glass rounded-[2rem] p-8 shadow-2xl text-center">
        <h1 class="text-3xl font-black italic text-[#FFD700] mb-8">DANILZ NESIA</h1>
        
        <div id="login-box">
            <input type="email" id="l-email" placeholder="Email" class="w-full p-4 mb-3 bg-white/5 border border-white/10 rounded-xl outline-none focus:border-yellow-500">
            <input type="password" id="l-pass" placeholder="Password" class="w-full p-4 mb-6 bg-white/5 border border-white/10 rounded-xl outline-none focus:border-yellow-500">
            <button onclick="doLogin()" class="btn-gold w-full py-4 rounded-xl uppercase text-sm">Masuk</button>
            <p class="mt-6 text-xs text-gray-500">Belum punya akun? <span onclick="toggle('reg')" class="text-yellow-500 cursor-pointer">Daftar</span></p>
        </div>

        <div id="reg-box" class="hidden">
            <input type="text" id="r-nama" placeholder="Nama Lengkap" class="w-full p-4 mb-3 bg-white/5 border border-white/10 rounded-xl outline-none">
            <input type="email" id="r-email" placeholder="Email" class="w-full p-4 mb-3 bg-white/5 border border-white/10 rounded-xl outline-none">
            <input type="password" id="r-pass" placeholder="Password (Min 6)" class="w-full p-4 mb-6 bg-white/5 border border-white/10 rounded-xl outline-none">
            <button onclick="doRegister()" class="btn-gold w-full py-4 rounded-xl uppercase text-sm">Buat Akun</button>
            <p class="mt-6 text-xs text-gray-500">Sudah punya akun? <span onclick="toggle('log')" class="text-yellow-500 cursor-pointer">Login</span></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBY7FaSViddpNqnncQ8Vtfp4Jmt7pJ6a80",
            authDomain: "danilz-nesia.firebaseapp.com",
            projectId: "danilz-nesia",
            appId: "1:796392081651:web:a36a4545ddf92d97910f86"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.doRegister = async () => {
            const e = document.getElementById('r-email').value;
            const p = document.getElementById('r-pass').value;
            const n = document.getElementById('r-nama').value;
            try {
                const res = await createUserWithEmailAndPassword(auth, e, p);
                await setDoc(doc(db, "users", res.user.uid), { nama: n, email: e, balance: 0 });
                window.location.href = "shop.html";
            } catch (err) { alert("Pendaftaran Gagal! Pastikan Authentication aktif."); }
        };

        window.doLogin = async () => {
            const e = document.getElementById('l-email').value;
            const p = document.getElementById('l-pass').value;
            try {
                await signInWithEmailAndPassword(auth, e, p);
                window.location.href = "shop.html";
            } catch (err) { alert("Login Gagal!"); }
        };

        window.toggle = (m) => {
            document.getElementById('login-box').classList.toggle('hidden', m==='reg');
            document.getElementById('reg-box').classList.toggle('hidden', m==='log');
        };
    </script>
</body>
</html>
